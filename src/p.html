<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G4™ Automation Report</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;line-height:1.5}
.header{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:14px}
.header-title{font-size:16px;font-weight:700;color:#f0f6fc}
.header-meta{font-size:11px;color:#8b949e;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.main{max-width:1440px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#8b949e;margin-bottom:5px}
.card-value{font-size:20px;font-weight:700;color:#f0f6fc;font-variant-numeric:tabular-nums}
.section{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.section-hdr{padding:10px 16px;background:#1c2128;border-bottom:1px solid #30363d;font-weight:600;font-size:12px;color:#f0f6fc;cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}
.section-hdr:hover{background:#21262d}
.section-body{padding:16px}
.session-info{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:14px}
.si-item{display:flex;flex-direction:column;gap:2px}
.si-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.06em}
.si-value{font-size:12px;color:#f0f6fc;font-family:'Consolas',monospace}
/* tree */
.plugin-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:background .1s}
.plugin-row:hover{background:#21262d}
.p-toggle{width:13px;height:13px;display:flex;align-items:center;justify-content:center;color:#8b949e;font-size:9px;flex-shrink:0}
.p-badge{font-size:9px;padding:1px 5px;border-radius:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;white-space:nowrap}
.badge-Action{background:#1f3a5f;color:#58a6ff}
.badge-Assertion{background:#3d2b00;color:#e3b341}
.badge-Operator{background:#2d1f4e;color:#b57bee}
.p-name{font-weight:600;color:#f0f6fc;white-space:nowrap;flex-shrink:0}
.p-arg{color:#8b949e;font-family:'Consolas',monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.p-elem{color:#6e7681;font-family:'Consolas',monospace;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.p-spacer{flex:1}
.p-bar-wrap{width:72px;height:5px;background:#21262d;border-radius:3px;overflow:hidden;flex-shrink:0}
.p-bar{height:100%;border-radius:3px;min-width:2px}
.bar-Action{background:#4e9eff}
.bar-Assertion{background:#e3b341}
.bar-Operator{background:#b57bee}
.p-dur{font-size:10px;color:#8b949e;white-space:nowrap;text-align:right;min-width:52px;flex-shrink:0;font-variant-numeric:tabular-nums}
.p-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-pass{background:#3fb950}
.dot-fail{background:#f85149}
.dot-neutral{background:#3d4451}
.p-children{margin-left:18px}
.p-children.hidden{display:none}
/* timeline */
.tl-wrap{overflow-x:auto}
/* assertions */
.assert-tbl{width:100%;border-collapse:collapse;font-size:12px}
.assert-tbl th{text-align:left;padding:7px 12px;background:#1c2128;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:10px;border-bottom:1px solid #30363d}
.assert-tbl td{padding:7px 12px;border-bottom:1px solid #21262d;vertical-align:top}
.assert-tbl tr:last-child td{border-bottom:none}
.assert-tbl tr:hover td{background:#1c2128}
.ev-pass{color:#3fb950;font-weight:700}
.ev-fail{color:#f85149;font-weight:700}
.reason{color:#8b949e;font-size:11px}
/* tags */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:9px;font-weight:600;line-height:1.6}
.tag-pass{background:#0f2d12;color:#3fb950;border:1px solid #238636}
.tag-fail{background:#2d0f0f;color:#f85149;border:1px solid #da3633}
.tag-neutral{background:#1c2128;color:#8b949e;border:1px solid #30363d}
/* chevron */
.chev{display:inline-block;transition:transform .15s;font-style:normal}
.chev.open{transform:rotate(90deg)}
.mono{font-family:'Consolas',monospace}
.no-data{color:#6e7681;font-style:italic;padding:16px;text-align:center}
/* timing breakdown bar */
.t-breakdown{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;width:100%;margin-top:4px}
.t-seg{height:100%;min-width:1px}
.t-seg-run{background:#4e9eff}
.t-seg-setup{background:#3fb950}
.t-seg-teardown{background:#e3b341}
.t-seg-setup-d{background:#2d8c4e}
.t-seg-teardown-d{background:#b57bee}
.t-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.t-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b949e}
.t-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>

// ── helpers ────────────────────────────────────────────────────────────────

function tickMs(t) { return t / 10000; }

function fmtDur(ticks) {
  if (ticks == null) return '—';
  const m = tickMs(ticks);
  if (m >= 1000) return (m / 1000).toFixed(2) + ' s';
  if (m >= 1)    return m.toFixed(0) + ' ms';
  return '< 1 ms';
}

function fmtBytes(b) {
  if (b == null) return '—';
  return b >= 1024 ? (b / 1024).toFixed(1) + ' KB' : b + ' B';
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'medium' });
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(s, n) {
  s = String(s ?? '');
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function pluginStatus(plugin) {
  for (const ext of (plugin.extractions || [])) {
    for (const ent of (ext.entities || [])) {
      const ev = ent.content?.Evaluation;
      if (ev === false) return 'fail';
      if (ev === true)  return 'pass';
    }
  }
  if ((plugin.exceptions || []).length > 0) return 'fail';
  return 'neutral';
}

function refType(plugin) {
  return plugin.performancePoint?.reference?.type || 'Action';
}

function collectAll(plugins, out = []) {
  for (const p of (plugins || [])) {
    out.push(p);
    collectAll(p.plugins, out);
  }
  return out;
}

function collectAssertions(plugins, out = []) {
  for (const p of (plugins || [])) {
    for (const ext of (p.extractions || [])) {
      for (const ent of (ext.entities || [])) {
        out.push({
          pluginName: p.performancePoint?.reference?.name || p.rule?.pluginName || '?',
          pluginType: refType(p),
          content: ent.content || {},
          session: ext.session
        });
      }
    }
    collectAssertions(p.plugins, out);
  }
  return out;
}

function findMachineInfo(stages) {
  for (const stage of (stages || [])) {
    for (const job of (stage.jobs || [])) {
      for (const p of collectAll(job.plugins)) {
        for (const ext of (p.extractions || [])) {
          if (ext.session?.machineName) return ext.session;
        }
      }
    }
  }
  return null;
}

// ── stat cards ─────────────────────────────────────────────────────────────

function renderCards(pp, session) {
  const totalRunMs = tickMs(pp.runTime);
  const items = [
    { label: 'Total Run', value: fmtDur(pp.runTime) },
    { label: 'Session', value: fmtDur(pp.sessionTime) },
    { label: 'Auth', value: fmtDur(pp.authenticationTime) },
    { label: 'Driver Setup', value: fmtDur(pp.driverSetupTime) },
    { label: 'Setup', value: fmtDur(pp.setupTime) },
    { label: 'Teardown', value: fmtDur(pp.teardownTime) },
    { label: 'Request', value: fmtBytes(session.requestSize) },
    { label: 'Response', value: fmtBytes(session.responseData?.responseSize) },
  ];

  const bars = [
    { cls: 't-seg-setup-d',   pct: pct(pp.driverSetupTime, pp.runTime),   label: 'Driver Setup' },
    { cls: 't-seg-setup',     pct: pct(pp.authenticationTime, pp.runTime), label: 'Auth' },
    { cls: 't-seg-run',       pct: pct(pp.sessionTime, pp.runTime),        label: 'Session' },
    { cls: 't-seg-teardown',  pct: pct(pp.setupTime, pp.runTime),          label: 'Setup' },
    { cls: 't-seg-teardown-d',pct: pct(pp.teardownTime, pp.runTime),       label: 'Teardown' },
  ];

  function pct(a, b) { return b > 0 ? Math.max(1, (a / b) * 100) : 0; }

  return `
  <div class="cards">
    ${items.map(c => `<div class="card"><div class="card-label">${esc(c.label)}</div><div class="card-value">${esc(c.value)}</div></div>`).join('')}
  </div>
  <div style="margin-top:14px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px;">
    <div class="card-label" style="margin-bottom:8px">Time Breakdown</div>
    <div class="t-breakdown">
      ${bars.map(b => `<div class="t-seg ${esc(b.cls)}" style="flex:${b.pct.toFixed(1)}" title="${esc(b.label)}: ${fmtDur(pp[b.label])}"></div>`).join('')}
    </div>
    <div class="t-legend">
      ${bars.map(b => `<div class="t-legend-item"><div class="t-legend-dot ${esc(b.cls)}"></div>${esc(b.label)}</div>`).join('')}
    </div>
  </div>`;
}

// ── plugin tree ─────────────────────────────────────────────────────────────

let _pid = 0;

function renderPlugin(plugin, depth, jobRunTime) {
  const id = 'p' + (_pid++);
  const ref  = plugin.performancePoint?.reference || {};
  const pp   = plugin.performancePoint || {};
  const rule = plugin.rule || {};
  const type = ref.type || 'Action';
  const name = ref.name || rule.pluginName || '?';
  const display = rule.capabilities?.displayName || name;
  const arg   = rule.argument || '';
  const elem  = rule.onElement || '';
  const rt    = pp.runTime || 0;
  const barPct = jobRunTime > 0 ? Math.min(100, (tickMs(rt) / tickMs(jobRunTime)) * 100) : 0;
  const status = pluginStatus(plugin);
  const hasKids = (plugin.plugins || []).length > 0;

  const kidsHtml = hasKids
    ? `<div class="p-children hidden" id="ck-${id}">${(plugin.plugins || []).map(c => renderPlugin(c, depth + 1, rt || jobRunTime)).join('')}</div>`
    : '';

  const descTitle = ref.description ? esc(trunc(ref.description, 200)) : '';

  return `<div>
    <div class="plugin-row" style="padding-left:${6 + depth * 20}px" onclick="togPlugin('${id}')" title="${descTitle}">
      <div class="p-toggle">${hasKids ? `<i class="chev" id="ci-${id}">&#9658;</i>` : '<span style="opacity:0;font-size:9px">&#9658;</span>'}</div>
      <span class="p-badge badge-${esc(type)}">${esc(type)}</span>
      <span class="p-name">${esc(display)}</span>
      ${arg  ? `<span class="p-arg">${esc(trunc(arg, 55))}</span>` : ''}
      ${elem ? `<span class="p-elem">&#x2022; ${esc(trunc(elem, 40))}</span>` : ''}
      <span class="p-spacer"></span>
      <div class="p-bar-wrap"><div class="p-bar bar-${esc(type)}" style="width:${barPct.toFixed(1)}%"></div></div>
      <span class="p-dur">${fmtDur(rt)}</span>
      <div class="p-dot dot-${status}" title="${status}"></div>
    </div>
    ${kidsHtml}
  </div>`;
}

function renderTree(stages) {
  if (!stages?.length) return '<div class="no-data">No stages.</div>';
  return stages.map(stage => {
    const jobs = stage.jobs || [];
    return `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;font-weight:700;color:#f0f6fc;font-size:13px;cursor:pointer;border-radius:6px"
           onclick="togEl('st-${esc(stage.id)}','si-${esc(stage.id)}')">
        <i class="chev open" id="si-${esc(stage.id)}">&#9658;</i>
        <svg width="14" height="14" viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="3" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1.5"/><path d="M4 8h8M8 4v8" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
        ${esc(stage.name)}
        <span style="color:#8b949e;font-weight:400;font-size:11px">${jobs.length} job${jobs.length !== 1 ? 's' : ''}</span>
      </div>
      <div id="st-${esc(stage.id)}">
        ${jobs.map(job => {
          const plugins = job.plugins || [];
          const jobRt = job.performancePoint?.runTime || 0;
          return `<div style="margin-left:18px;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px;padding:6px 4px;color:#c9d1d9;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px"
                 onclick="togEl('jb-${esc(job.id)}','ji-${esc(job.id)}')">
              <i class="chev open" id="ji-${esc(job.id)}">&#9658;</i>
              <svg width="12" height="12" viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="10" rx="2" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1.5"/><path d="M5 8h6" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
              ${esc(job.name)}
              <span style="color:#8b949e;font-weight:400;font-size:11px">${plugins.length} plugin${plugins.length !== 1 ? 's' : ''} &bull; ${fmtDur(jobRt)}</span>
            </div>
            <div id="jb-${esc(job.id)}">
              ${plugins.map(p => renderPlugin(p, 0, jobRt)).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── timeline ────────────────────────────────────────────────────────────────

function renderTimeline(stages, sessionStart, sessionEnd) {
  const t0 = new Date(sessionStart).getTime();
  const t1 = new Date(sessionEnd).getTime();
  const span = Math.max(t1 - t0, 1);

  const ROW = 24, LW = 155, CW = 740, AH = 20, PAD = 6;
  const TYPE_CLR = { Action: '#4e9eff', Assertion: '#e3b341', Operator: '#b57bee' };

  function flatPlugins(plugins, depth, out) {
    for (const p of (plugins || [])) {
      const ref  = p.performancePoint?.reference || {};
      const name = ref.name || p.rule?.pluginName || '?';
      const type = ref.type || 'Action';
      const s = new Date(p.performancePoint?.start || sessionStart).getTime();
      const e = new Date(p.performancePoint?.end   || sessionEnd).getTime();
      out.push({ name, type, depth, s, e });
      flatPlugins(p.plugins, depth + 1, out);
    }
  }

  const rows = [];
  for (const stage of (stages || []))
    for (const job of (stage.jobs || []))
      flatPlugins(job.plugins, 0, rows);

  const svgH = ROW * rows.length + AH + PAD * 2;
  const TICKS = 6;

  const axisTicks = Array.from({ length: TICKS + 1 }, (_, i) => {
    const x = LW + (i / TICKS) * CW;
    const ms = (i / TICKS) * span;
    const lbl = ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : Math.round(ms) + 'ms';
    return `<line x1="${x}" y1="${PAD}" x2="${x}" y2="${PAD + ROW * rows.length}" stroke="#21262d" stroke-width="1"/>
      <text x="${x}" y="${PAD + ROW * rows.length + 14}" text-anchor="middle" fill="#6e7681" font-size="10" font-family="Segoe UI,sans-serif">${lbl}</text>`;
  }).join('');

  const rowsSvg = rows.map((r, i) => {
    const y = PAD + i * ROW;
    const xS = LW + ((r.s - t0) / span) * CW;
    const w  = Math.max(3, ((r.e - r.s) / span) * CW);
    const clr = TYPE_CLR[r.type] || '#4e9eff';
    const lx  = LW - 4 - r.depth * 14;
    const bg  = i % 2 === 0 ? '#0d1117' : '#111827';
    return `<rect x="0" y="${y}" width="${LW + CW}" height="${ROW}" fill="${bg}"/>
      <text x="${lx}" y="${y + ROW / 2 + 4}" text-anchor="end" fill="#c9d1d9" font-size="11" font-family="Segoe UI,sans-serif">${esc(trunc(r.name, 18))}</text>
      <rect x="${xS.toFixed(1)}" y="${y + 5}" width="${w.toFixed(1)}" height="${ROW - 10}" rx="3" fill="${clr}" opacity=".85">
        <title>${esc(r.name)}: ${fmtDur(null)} (${fmtTime(new Date(r.s).toISOString())} – ${fmtTime(new Date(r.e).toISOString())})</title>
      </rect>`;
  }).join('');

  return `<div class="tl-wrap">
    <svg width="${LW + CW + PAD}" height="${svgH}" style="display:block" xmlns="http://www.w3.org/2000/svg">
      <rect width="${LW + CW + PAD}" height="${svgH}" fill="#0d1117"/>
      ${axisTicks}
      ${rowsSvg}
    </svg>
    <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e"><div style="width:10px;height:10px;border-radius:2px;background:#4e9eff"></div>Action</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e"><div style="width:10px;height:10px;border-radius:2px;background:#e3b341"></div>Assertion</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e"><div style="width:10px;height:10px;border-radius:2px;background:#b57bee"></div>Operator</div>
    </div>
  </div>`;
}

// ── assertions table ────────────────────────────────────────────────────────

function renderAssertions(assertions) {
  if (!assertions.length) return '<div class="no-data">No assertion data found.</div>';
  const rows = assertions.map(a => {
    const c = a.content;
    const ev = c.Evaluation;
    const evClass = ev === true ? 'ev-pass' : ev === false ? 'ev-fail' : '';
    const evText  = ev === true ? '&#10003; Pass' : ev === false ? '&#10007; Fail' : '—';
    return `<tr>
      <td><span class="p-badge badge-${esc(a.pluginType)}">${esc(a.pluginType)}</span> <strong>${esc(a.pluginName)}</strong></td>
      <td class="mono">${esc(c.Condition || '—')}</td>
      <td class="mono">${esc(c.Operator  || '—')}</td>
      <td class="mono">${esc(c.Expected  ?? '—')}</td>
      <td class="mono">${esc(String(c.Actual ?? '—'))}</td>
      <td class="${evClass}">${evText}</td>
      <td class="reason">${esc(c.ReasonPhrase || '—')}</td>
    </tr>`;
  }).join('');
  return `<table class="assert-tbl">
    <thead><tr>
      <th>Plugin</th><th>Condition</th><th>Operator</th>
      <th>Expected</th><th>Actual</th><th>Result</th><th>Reason Phrase</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── header ──────────────────────────────────────────────────────────────────

function renderHeader(automationRef, pp) {
  const name = automationRef.name || 'Untitled Automation';
  return `<div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <rect width="28" height="28" rx="6" fill="#1f3a5f"/>
      <path d="M7 14h14M14 7l7 7-7 7" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="header-title">G4&#x2122; Automation Report</div>
      <div class="header-meta">${esc(name)} &bull; ${esc(fmtDateTime(pp.start))}</div>
    </div>
    <div class="header-right">
      <span class="tag tag-neutral mono" style="font-size:11px">${esc(pp.driverSession || '—')}</span>
    </div>
  </div>`;
}

// ── main ────────────────────────────────────────────────────────────────────

function renderApp() {
  const pp       = DATA.performancePoint || {};
  const sessions = DATA.sessions || {};
  const sids     = Object.keys(sessions);

  let automationRef = {};
  if (sids.length) {
    const first  = sessions[sids[0]];
    const stages = first.responseTree?.stages || [];
    if (stages.length) automationRef = stages[0].automationReference || {};
  }

  const sessionHtml = sids.map((sid, idx) => {
    const session  = sessions[sid];
    const spp      = session.performancePoint || {};
    const stages   = session.responseTree?.stages || [];
    const allJobs  = stages.flatMap(s => s.jobs || []);
    const allPlugs = allJobs.flatMap(j => collectAll(j.plugins));
    const asserts  = allJobs.flatMap(j => collectAssertions(j.plugins));
    const fails    = asserts.filter(a => a.content?.Evaluation === false).length;
    const passes   = asserts.filter(a => a.content?.Evaluation === true).length;
    const machine  = findMachineInfo(stages);

    const overallTag = fails > 0
      ? `<span class="tag tag-fail">&#10007; ${fails} Failed</span>`
      : passes > 0
        ? `<span class="tag tag-pass">&#10003; All Passed</span>`
        : `<span class="tag tag-neutral">No Assertions</span>`;

    return `<div>
      <!-- session title bar -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1.2"/><text x="8" y="12" text-anchor="middle" font-size="9" font-family="Segoe UI,sans-serif" fill="#58a6ff" font-weight="700">${idx + 1}</text></svg>
        <span style="font-weight:700;font-size:14px;color:#f0f6fc">Session</span>
        <span class="mono" style="color:#8b949e;font-size:12px">${esc(sid)}</span>
        <span style="margin-left:auto">${overallTag}</span>
      </div>

      <!-- session info strip -->
      <div class="session-info" style="margin-bottom:16px">
        ${machine ? `
        <div class="si-item"><div class="si-label">Machine</div><div class="si-value">${esc(machine.machineName)}</div></div>
        <div class="si-item"><div class="si-label">IP</div><div class="si-value">${esc(machine.machineIp)}</div></div>
        ` : ''}
        <div class="si-item"><div class="si-label">Start</div><div class="si-value">${esc(fmtTime(spp.start))}</div></div>
        <div class="si-item"><div class="si-label">End</div><div class="si-value">${esc(fmtTime(spp.end))}</div></div>
        <div class="si-item"><div class="si-label">Plugins Run</div><div class="si-value">${allPlugs.length}</div></div>
        <div class="si-item"><div class="si-label">Stages</div><div class="si-value">${stages.length}</div></div>
        <div class="si-item"><div class="si-label">Jobs</div><div class="si-value">${allJobs.length}</div></div>
      </div>

      <!-- stat cards -->
      ${renderCards(spp, session)}

      <!-- plugin tree -->
      <div class="section" style="margin-top:20px">
        <div class="section-hdr" onclick="togEl('tr-${sid}','ti-${sid}')">
          <i class="chev open" id="ti-${sid}">&#9658;</i>
          Plugin Tree
          <span style="color:#8b949e;font-weight:400;font-size:11px">${stages.length} stage${stages.length !== 1 ? 's' : ''} &bull; ${allPlugs.length} total plugins</span>
        </div>
        <div class="section-body" id="tr-${sid}">${renderTree(stages)}</div>
      </div>

      <!-- timeline -->
      <div class="section" style="margin-top:14px">
        <div class="section-hdr" onclick="togEl('tl-${sid}','tli-${sid}')">
          <i class="chev open" id="tli-${sid}">&#9658;</i>
          Execution Timeline
        </div>
        <div class="section-body" id="tl-${sid}">${renderTimeline(stages, spp.start, spp.end)}</div>
      </div>

      <!-- assertions -->
      <div class="section" style="margin-top:14px">
        <div class="section-hdr" onclick="togEl('as-${sid}','ai-${sid}')">
          <i class="chev open" id="ai-${sid}">&#9658;</i>
          Assertions
          ${fails  > 0 ? `<span class="tag tag-fail" style="margin-left:4px">${fails} Fail</span>` : ''}
          ${passes > 0 ? `<span class="tag tag-pass" style="margin-left:4px">${passes} Pass</span>` : ''}
        </div>
        <div id="as-${sid}">${renderAssertions(asserts)}</div>
      </div>
    </div>`;
  }).join('<div style="border-top:1px solid #30363d;margin:28px 0"></div>');

  document.getElementById('app').innerHTML =
    renderHeader(automationRef, pp) +
    `<div class="main">${sessionHtml}</div>`;
}

// ── toggle helpers ──────────────────────────────────────────────────────────

function togEl(id, iconId) {
  const el = document.getElementById(id);
  const ic = document.getElementById(iconId);
  if (!el) return;
  const hide = el.style.display !== 'none';
  el.style.display = hide ? 'none' : '';
  if (ic) { hide ? ic.classList.remove('open') : ic.classList.add('open'); }
}

function togPlugin(id) {
  const ch = document.getElementById('ck-' + id);
  const ic = document.getElementById('ci-' + id);
  if (!ch) return;
  const collapsed = ch.classList.contains('hidden');
  ch.classList.toggle('hidden', !collapsed);
  if (ic) { collapsed ? ic.classList.add('open') : ic.classList.remove('open'); }
}

renderApp();
</script>
