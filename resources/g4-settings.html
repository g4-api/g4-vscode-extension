<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4™ Settings</title>
    <!-- layout -->
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        @font-face {
            font-family: 'Inter';
            src: url('{{$ fonts.uri }}') format('truetype');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap
        }

        html {
            height: 100%
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 14px
        }

        #app {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-gutter: stable
        }

        .header-title {
            font-size: 16px;
            font-weight: 700
        }

        .header-meta {
            font-size: 11px;
            margin-top: 1px
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        /* sections */
        .section {
            overflow: hidden
        }

        .section-hdr {
            padding: 10px 16px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .section-body {
            padding: 16px
        }

        .section-desc {
            font-size: 11px;
            margin-bottom: 14px
        }

        .meta-text {
            font-weight: 400;
            font-size: 11px
        }

        /* fields */
        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px
        }

        .field:last-child {
            margin-bottom: 0
        }

        .field-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
            /* Align each field's bottom edge so the inputs line up across the
               row even when one field has an extra line of label/hint text. */
            align-items: end
        }

        .field-row:last-child {
            margin-bottom: 0
        }

        .field-row .field {
            margin-bottom: 0
        }

        .field-label {
            font-size: 12px;
            font-weight: 600
        }

        .field-hint {
            font-size: 11px
        }

        .field-error {
            font-size: 11px;
            min-height: 14px
        }

        .field-suffix {
            font-size: 11px;
            margin-left: 6px
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            font-family: inherit;
            font-size: 12px;
            padding: 6px 8px;
            width: 100%;
            background: transparent;
            color: inherit;
            outline: none
        }

        /* Single-line controls share one height so text inputs and selects line
           up exactly (a native select has a taller intrinsic box than an input,
           so equal padding alone isn't enough). Textarea keeps its own height. */
        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            height: 30px
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            font-family: 'Consolas', monospace
        }

        /* The native number spinners can't be themed (they render as a light
           Chromium control that clashes with the editor theme), so hide them.
           Typing and the keyboard up/down arrows still adjust the value. */
        input[type="number"] {
            -moz-appearance: textfield
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0
        }

        /* themed number steppers */
        .num-wrap {
            position: relative;
            display: flex
        }

        .num-wrap input {
            flex: 1;
            padding-right: 24px
        }

        .num-steppers {
            position: absolute;
            top: 1px;
            right: 1px;
            bottom: 1px;
            width: 20px;
            display: flex;
            flex-direction: column
        }

        .num-step {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: none;
            cursor: pointer
        }

        .num-step svg {
            width: 9px;
            height: 9px;
            display: block
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--vscode-focusBorder)
        }

        select option {
            background: var(--vscode-dropdown-background, var(--vscode-editor-background));
            color: var(--vscode-dropdown-foreground, var(--vscode-editor-foreground))
        }

        .input-wrap {
            display: flex;
            align-items: stretch;
            gap: 6px
        }

        .input-wrap input,
        .input-wrap select {
            flex: 1
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            flex-shrink: 0
        }

        .icon-btn svg {
            width: 14px;
            height: 14px;
            display: block
        }

        /* Button that swaps its label for a centered spinner while busy, without
           changing size (the hidden label still reserves the width). */
        .spin-btn {
            position: relative
        }

        .spin-btn .btn-spinner {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center
        }

        .spin-btn .btn-spinner svg {
            width: 13px;
            height: 13px;
            display: block
        }

        .spin-btn.is-busy .btn-label {
            visibility: hidden
        }

        .spin-btn.is-busy .btn-spinner {
            display: flex
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .is-busy svg {
            animation: spin .8s linear infinite
        }

        /* toggle switch */
        .toggle {
            display: inline-flex;
            align-self: flex-start;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none
        }

        .toggle input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0
        }

        .switch {
            position: relative;
            width: 34px;
            height: 18px;
            border-radius: 9px;
            flex-shrink: 0;
            transition: background-color .15s
        }

        .switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: transform .15s
        }

        .toggle input:checked+.switch::after {
            transform: translateX(16px)
        }

        .toggle-text {
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .toggle-label {
            font-size: 12px;
            font-weight: 600
        }

        .toggle-hint {
            font-size: 11px
        }

        /* buttons */
        .btn {
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            border: none;
            border-radius: 2px
        }

        .btn-ghost {
            background: transparent;
            font-weight: 500
        }

        .btn-sm {
            font-size: 11px;
            padding: 3px 9px
        }

        .btn:disabled {
            opacity: .6;
            cursor: default
        }

        /* action bar */
        .actionbar {
            position: sticky;
            bottom: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            z-index: 5
        }

        .actionbar .spacer {
            flex: 1
        }

        .save-note {
            font-size: 11px;
            opacity: 0;
            transition: opacity .2s
        }

        .save-note.show {
            opacity: 1
        }

        /* repeatable cards */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .item-card {
            padding: 14px
        }

        .item-card-hdr {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px
        }

        .item-card-title {
            font-weight: 600;
            font-size: 12px
        }

        .item-card-hdr .spacer {
            flex: 1
        }

        .add-row {
            margin-top: 12px
        }

        /* key/value rows (e.g. HTTP headers) */
        .kv-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .kv-row {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .kv-row .kv-key {
            flex: 0 0 38%
        }

        .kv-row .kv-val {
            flex: 1
        }

        .kv-row .btn {
            flex-shrink: 0
        }

        .required-mark {
            font-weight: 700
        }

        .subhdr {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin: 14px 0 8px
        }

        .note {
            font-size: 11px;
            padding: 8px 12px;
            margin-top: 4px
        }

        .mono {
            font-family: 'Consolas', monospace
        }

        /* json editor */
        .json-wrap {
            position: relative
        }

        .json-format-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            opacity: 0;
            transition: opacity .15s
        }

        .json-wrap:hover .json-format-btn,
        .json-wrap:focus-within .json-format-btn {
            opacity: 1
        }

        /* chevron */
        .chev {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-style: normal
        }

        .chev .chev-r {
            display: block
        }

        .chev .chev-d {
            display: none
        }

        .chev.open .chev-r {
            display: none
        }

        .chev.open .chev-d {
            display: block
        }

        .read-only-tag {
            font-size: 9px;
            padding: 1px 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em
        }
    </style>

    <!-- colors -->
    <style>
        body {
            background-color: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground)
        }

        .header {
            background-color: var(--vscode-editorGroupHeader-tabsBackground);
            border-bottom: 1px solid var(--vscode-panel-border)
        }

        .header-meta {
            color: var(--vscode-descriptionForeground)
        }

        .section {
            border: 1px solid var(--vscode-panel-border)
        }

        .section-hdr {
            background-color: var(--vscode-sideBar-background);
            border-bottom: 1px solid var(--vscode-panel-border)
        }

        .section-hdr:has(.chev:not(.open)) {
            border-bottom: none
        }

        .section-desc,
        .field-hint,
        .field-suffix,
        .toggle-hint,
        .meta-text,
        .save-note {
            color: var(--vscode-descriptionForeground)
        }

        .field-error,
        .required-mark,
        .status-err {
            color: var(--vscode-errorForeground)
        }

        .status-ok {
            color: var(--vscode-testing-iconPassed, #22c55e)
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            border: 1px solid var(--vscode-input-border, var(--vscode-panel-border));
            background-color: var(--vscode-input-background, transparent)
        }

        .num-steppers {
            border-left: 1px solid var(--vscode-input-border, var(--vscode-panel-border))
        }

        .num-step {
            background-color: var(--vscode-input-background, transparent);
            color: var(--vscode-foreground)
        }

        .num-step:first-child {
            border-bottom: 1px solid var(--vscode-input-border, var(--vscode-panel-border))
        }

        .num-step:hover {
            background-color: var(--vscode-list-hoverBackground)
        }

        .num-step svg path {
            fill: currentColor
        }

        .switch {
            background-color: var(--vscode-panel-border)
        }

        .switch::after {
            background-color: var(--vscode-editor-background)
        }

        .toggle input:checked+.switch {
            background-color: var(--vscode-testing-iconPassed, #22c55e)
        }

        .btn {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground)
        }

        .btn:hover {
            background-color: var(--vscode-button-hoverBackground, var(--vscode-button-background))
        }

        .btn-ghost {
            color: var(--vscode-foreground);
            border: 1px solid var(--vscode-panel-border)
        }

        .btn-ghost:hover {
            background-color: var(--vscode-list-hoverBackground)
        }

        .json-format-btn {
            background-color: var(--vscode-input-background, var(--vscode-editor-background))
        }

        .json-format-btn:hover {
            background-color: var(--vscode-list-hoverBackground)
        }

        .actionbar {
            background-color: var(--vscode-editorGroupHeader-tabsBackground);
            border-top: 1px solid var(--vscode-panel-border)
        }

        .item-card {
            border: 1px solid var(--vscode-panel-border);
            background-color: var(--vscode-sideBar-background)
        }

        .note {
            border: 1px solid var(--vscode-panel-border);
            background-color: var(--vscode-sideBar-background);
            color: var(--vscode-descriptionForeground)
        }

        .read-only-tag {
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            border: 1px solid var(--vscode-panel-border)
        }

        a {
            color: var(--vscode-textLink-foreground);
            text-decoration: none
        }

        a:hover {
            color: var(--vscode-textLink-activeForeground, var(--vscode-textLink-foreground));
            text-decoration: underline
        }
    </style>
</head>

    <script id="src-utilities">
        /**
         * Escapes a value so it can be safely rendered as HTML text or inside
         * double-quoted HTML attributes.
         *
         * @param {*} s - The value to escape.
         * @returns {string} The escaped HTML-safe string.
         */
        function clearString(s) {
            return String(s ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;');
        }

        /**
         * Creates a deep copy of a plain JSON-compatible value.
         *
         * Used to clone DEFAULTS into an editable working state without ever
         * mutating the baseline.
         *
         * @param {*} value - The JSON-compatible value to copy.
         * @returns {*} A deep copy of the value.
         */
        function deepCopy(value) {
            return JSON.parse(JSON.stringify(value));
        }

        /**
         * Reads a nested value from an object using a dotted path.
         *
         * Path segments may themselves contain dots when wrapped in the escape
         * marker produced by escapeKey() (used for keys like "uia:options").
         *
         * @param {object} root - The object to read from.
         * @param {string} path - A dotted path (e.g. "settings.automationSettings.loadTimeout").
         * @returns {*} The resolved value, or undefined when any segment is missing.
         */
        function getPath(root, path) {
            return splitPath(path).reduce(
                (acc, key) => (acc == null ? acc : acc[key]),
                root
            );
        }

        /**
         * Writes a nested value into an object using a dotted path.
         * Missing intermediate objects are created along the way.
         *
         * @param {object} root - The object to write into.
         * @param {string} path - A dotted path to the target leaf.
         * @param {*} value - The value to assign.
         */
        function setPath(root, path, value) {
            const keys = splitPath(path);
            const last = keys.pop();

            // Walk to the parent of the target leaf, creating objects as needed.
            const parent = keys.reduce((acc, key) => {
                if (acc[key] == null || typeof acc[key] !== 'object') {
                    acc[key] = {};
                }
                return acc[key];
            }, root);

            parent[last] = value;
        }

        // Marker used to wrap a single path segment that legitimately contains
        // dots or colons (for example the WebDriver key "uia:options").
        const KEY_OPEN = '{{';
        const KEY_CLOSE = '}}';

        /**
         * Wraps a key so it survives dotted-path splitting unchanged.
         *
         * @param {string} key - The raw object key.
         * @returns {string} The escaped key segment.
         */
        function escapeKey(key) {
            return KEY_OPEN + key + KEY_CLOSE;
        }

        /**
         * Splits a dotted path into segments, keeping escaped segments intact.
         *
         * @param {string} path - The dotted path to split.
         * @returns {string[]} The resolved path segments.
         */
        function splitPath(path) {
            const segments = [];
            let i = 0;

            while (i < path.length) {
                // An escaped segment is copied verbatim between the markers.
                if (path.startsWith(KEY_OPEN, i)) {
                    const end = path.indexOf(KEY_CLOSE, i + KEY_OPEN.length);
                    segments.push(path.slice(i + KEY_OPEN.length, end));
                    i = end + KEY_CLOSE.length;

                    // Skip the dot that follows an escaped segment, if present.
                    if (path[i] === '.') {
                        i++;
                    }
                    continue;
                }

                // A normal segment runs up to the next dot.
                let dot = path.indexOf('.', i);
                if (dot === -1) {
                    dot = path.length;
                }
                segments.push(path.slice(i, dot));
                i = dot + 1;
            }

            return segments;
        }

        /**
         * Toggles the visibility of a section body and updates its chevron icon.
         *
         * @param {string} id - The id of the section body element to show or hide.
         * @param {string} iconId - The id of the chevron icon to update.
         */
        function toggleElement(id, iconId) {
            const element = document.getElementById(id);
            const icon = document.getElementById(iconId);

            if (!element) {
                return;
            }

            const isHide = element.style.display !== 'none';
            element.style.display = isHide ? 'none' : '';

            if (!icon) {
                return;
            }

            isHide
                ? icon.classList.remove('open')
                : icon.classList.add('open');
        }
    </script>

    <script id="src-controls">
        /**
         * Renders a collapsible settings section shell.
         *
         * @param {object} options - Section options.
         * @param {string} options.id - Unique id suffix for the section.
         * @param {string} options.title - The section title.
         * @param {string} [options.desc] - An optional one-line description.
         * @param {string} options.body - The inner HTML for the section body.
         * @param {boolean} [options.open=true] - Whether the section starts expanded.
         * @returns {string} HTML markup for the section.
         */
        function writeSection({ id, title, desc, body, open = true }) {
            const descHtml = desc
                ? `<div class="section-desc">${clearString(desc)}</div>`
                : '';

            return `
            <div class="section">
                <div class="section-hdr" onclick="toggleElement('sec-${id}','seci-${id}')">
                    <i class="chev ${open ? 'open' : ''}" id="seci-${id}">${SVG_CHEVRON}</i>
                    ${clearString(title)}
                </div>
                <div class="section-body" id="sec-${id}" ${open ? '' : 'style="display:none"'}>
                    ${descHtml}${body}
                </div>
            </div>`;
        }

        /**
         * Renders a single-line text/number input bound to a state path.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path the control binds to.
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @param {string} [options.type='text'] - The HTML input type.
         * @param {string} [options.suffix] - Optional unit/suffix text after the input.
         * @param {string} [options.placeholder] - Optional placeholder text.
         * @returns {string} HTML markup for the text field.
         */
        function writeText({ path, label, hint, type = 'text', suffix, placeholder, min, max, required, maxLength, validate }) {
            const value = getPath(STATE, path);
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';
            const suffixHtml = suffix ? `<span class="field-suffix">${clearString(suffix)}</span>` : '';
            const ph = placeholder ? ` placeholder="${clearString(placeholder)}"` : '';
            const kind = type === 'number' ? 'number' : 'text';
            const minAttr = min != null ? ` min="${min}"` : '';
            const maxAttr = max != null ? ` max="${max}"` : '';
            const maxLenAttr = maxLength != null ? ` maxlength="${maxLength}"` : '';

            // Pass the lower bound through so onInput can clamp the stored value.
            const minArg = min != null ? `, ${min}` : '';
            const slug = path.replace(/[^a-z0-9]/gi, '-');
            const inputId = 'inp-' + slug;

            // Required marker + inline validation are only wired for text fields;
            // number fields stay valid via their min/step handling.
            const star = required ? ' <span class="required-mark">*</span>' : '';
            const wantsCheck = (required || validate) && kind !== 'number';
            const errId = 'fielderr-' + slug;
            const checkArg = wantsCheck
                ? `; checkField('${errId}', this.value, ${!!required}, '${validate || ''}')`
                : '';
            const errHtml = wantsCheck
                ? `<div class="field-error" id="${errId}">${clearString(computeFieldError(value, required, validate))}</div>`
                : '';

            const inputHtml = `<input id="${inputId}" type="${type}" value="${clearString(value ?? '')}"${ph}${minAttr}${maxAttr}${maxLenAttr}
                    oninput="onInput('${path}', this.value, '${kind}'${minArg})${checkArg}" />`;

            // Number fields get themed up/down steppers in place of the native
            // (un-themable) spinner controls. The buttons step the value by 1,
            // honoring the same min/max bounds as typing.
            const control = kind === 'number'
                ? `<div class="num-wrap">
                    ${inputHtml}
                    <div class="num-steppers">
                        <button type="button" class="num-step" tabindex="-1" aria-label="Increase"
                            onclick="stepNumber('${path}', '${inputId}', 1, ${min ?? 'null'}, ${max ?? 'null'})">${SVG_CARET_UP}</button>
                        <button type="button" class="num-step" tabindex="-1" aria-label="Decrease"
                            onclick="stepNumber('${path}', '${inputId}', -1, ${min ?? 'null'}, ${max ?? 'null'})">${SVG_CARET_DOWN}</button>
                    </div>
                </div>`
                : inputHtml;

            return `
            <div class="field">
                <label class="field-label">${clearString(label)}${star}${suffixHtml}</label>
                ${hintHtml}
                ${control}
                ${errHtml}
            </div>`;
        }

        /**
         * Renders a password input with a show/hide reveal button.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path the control binds to.
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @returns {string} HTML markup for the secret field.
         */
        function writeSecret({ path, label, hint }) {
            const value = getPath(STATE, path);
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';
            const safeId = 'secret-' + path.replace(/[^a-z0-9]/gi, '-');

            return `
            <div class="field">
                <label class="field-label">${clearString(label)}</label>
                ${hintHtml}
                <div class="input-wrap">
                    <input id="${safeId}" type="password" value="${clearString(value ?? '')}"
                        oninput="onInput('${path}', this.value)" />
                    <button type="button" class="btn btn-ghost btn-sm"
                        onclick="toggleSecret('${safeId}', this)">Show</button>
                </div>
            </div>`;
        }

        /**
         * Renders a dropdown bound to a state path.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path the control binds to.
         * @param {string} options.label - Human-friendly field label.
         * @param {Array<{value:string,text:string}>} options.choices - The available options.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @returns {string} HTML markup for the select field.
         */
        function writeSelect({ path, label, choices, hint }) {
            const value = getPath(STATE, path);
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';

            const optionsHtml = choices.map(choice => `
                <option value="${clearString(choice.value)}" ${choice.value === value ? 'selected' : ''}>
                    ${clearString(choice.text)}
                </option>`).join('');

            return `
            <div class="field">
                <label class="field-label">${clearString(label)}</label>
                ${hintHtml}
                <select onchange="onInput('${path}', this.value)">${optionsHtml}</select>
            </div>`;
        }

        /**
         * Renders an on/off toggle switch bound to a boolean state path.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path the control binds to.
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown beside the toggle.
         * @returns {string} HTML markup for the toggle.
         */
        function writeToggle({ path, label, hint }) {
            const value = !!getPath(STATE, path);
            const hintHtml = hint ? `<div class="toggle-hint">${clearString(hint)}</div>` : '';

            return `
            <div class="field">
                <label class="toggle">
                    <input type="checkbox" ${value ? 'checked' : ''}
                        onchange="onInput('${path}', this.checked, 'bool')" />
                    <span class="switch"></span>
                    <span class="toggle-text">
                        <span class="toggle-label">${clearString(label)}</span>
                        ${hintHtml}
                    </span>
                </label>
            </div>`;
        }

        /**
         * Renders a multi-line textarea whose lines map to a string array in state.
         *
         * Empty lines are ignored, so an empty textarea becomes an empty array.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path the control binds to (string[]).
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @returns {string} HTML markup for the list field.
         */
        function writeListLines({ path, label, hint }) {
            const value = getPath(STATE, path);
            const text = Array.isArray(value) ? value.join('\n') : '';
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';

            return `
            <div class="field">
                <label class="field-label">${clearString(label)}</label>
                ${hintHtml}
                <textarea oninput="onListInput('${path}', this.value)">${clearString(text)}</textarea>
            </div>`;
        }

        /**
         * Renders a JSON editor bound to an object/array state path.
         *
         * The textarea shows the value pretty-printed. On each edit the text is
         * parsed; valid JSON is written to state, invalid JSON leaves the last
         * good value untouched and surfaces an inline error so a half-typed
         * object never corrupts the manifest.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path the control binds to.
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @param {number} [options.rows=8] - Visible height of the editor, in text rows.
         * @returns {string} HTML markup for the JSON field.
         */
        function writeJson({ path, label, hint, rows = 8 }) {
            const value = getPath(STATE, path);
            const text = value == null ? '' : JSON.stringify(value, null, 4);
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';
            const slug = path.replace(/[^a-z0-9]/gi, '-');
            const errId = 'jsonerr-' + slug;
            const taId = 'json-' + slug;

            return `
            <div class="field">
                <label class="field-label">${clearString(label)}</label>
                ${hintHtml}
                <div class="json-wrap">
                    <textarea id="${taId}" class="mono" style="min-height:${rows * 18}px"
                        oninput="onJsonInput('${path}', this.value, '${errId}')">${clearString(text)}</textarea>
                    <button type="button" class="btn btn-ghost btn-sm json-format-btn"
                        title="Check &amp; format JSON" onclick="formatJson('${taId}', '${path}', '${errId}')">Format</button>
                </div>
                <div class="field-error" id="${errId}"></div>
            </div>`;
        }

        /**
         * Renders an editor for a string→string map (e.g. HTTP headers) as a list
         * of key/value rows with add and remove controls.
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path to the map object.
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @param {string} [options.keyPlaceholder='Key'] - Placeholder for key inputs.
         * @param {string} [options.valuePlaceholder='Value'] - Placeholder for value inputs.
         * @param {string} [options.addLabel='Add'] - Caption for the add button.
         * @param {string} [options.emptyText='None.'] - Text shown when the map is empty.
         * @returns {string} HTML markup for the key/value field.
         */
        function writeKeyValue({ path, label, hint, keyPlaceholder = 'Key', valuePlaceholder = 'Value', addLabel = 'Add', emptyText = 'None.' }) {
            const map = getPath(STATE, path) || {};
            const entries = Object.entries(map);
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';
            const listId = 'kv-' + path.replace(/[^a-z0-9]/gi, '-');

            const rows = entries.length
                ? entries.map(([key, val]) => `
                    <div class="kv-row">
                        <input type="text" class="kv-key" value="${clearString(key)}" placeholder="${clearString(keyPlaceholder)}"
                            onchange="renameEntryKey('${path}', '${clearString(key)}', this.value)" />
                        <input type="text" class="kv-val" value="${clearString(val)}" placeholder="${clearString(valuePlaceholder)}"
                            oninput="setEntryValue('${path}', '${clearString(key)}', this.value)" />
                        <button type="button" class="btn btn-ghost btn-sm" onclick="removeEntry('${path}', '${clearString(key)}')">Remove</button>
                    </div>`).join('')
                : `<div class="field-hint">${clearString(emptyText)}</div>`;

            return `
            <div class="field">
                <label class="field-label">${clearString(label)}</label>
                ${hintHtml}
                <div class="kv-list" id="${listId}">${rows}</div>
                <div class="add-row">
                    <button type="button" class="btn btn-ghost btn-sm" onclick="addEntry('${path}')">+ ${clearString(addLabel)}</button>
                </div>
            </div>`;
        }

        /**
         * Renders an HTTP-credentials editor (None / Basic / Bearer) bound to an
         * AuthenticationModel object at `path`.
         *
         * Stored shape (assumed):
         *   none   -> null
         *   basic  -> { type: 'basic', username, password }
         *   bearer -> { type: 'bearer', token }
         *
         * @param {object} options - Control options.
         * @param {string} options.path - Dotted state path to the credentials object.
         * @param {string} options.label - Human-friendly field label.
         * @param {string} [options.hint] - Optional helper text shown under the label.
         * @returns {string} HTML markup for the credentials editor.
         */
        function writeCredentials({ path, label, hint }) {
            const type = credentialsType(getPath(STATE, path));
            const hintHtml = hint ? `<div class="field-hint">${clearString(hint)}</div>` : '';

            const selector = `
            <div class="field">
                <label class="field-label">${clearString(label)}</label>
                ${hintHtml}
                <select onchange="setCredentialsType('${path}', this.value)">
                    <option value="none" ${type === 'none' ? 'selected' : ''}>None</option>
                    <option value="basic" ${type === 'basic' ? 'selected' : ''}>Basic (username &amp; password)</option>
                    <option value="bearer" ${type === 'bearer' ? 'selected' : ''}>Bearer (token)</option>
                </select>
            </div>`;

            let fields = '';
            if (type === 'basic') {
                fields = `
                <div class="field-row">
                    ${writeText({ path: `${path}.username`, label: 'Username' })}
                    ${writeSecret({ path: `${path}.password`, label: 'Password' })}
                </div>`;
            } else if (type === 'bearer') {
                fields = writeSecret({ path: `${path}.token`, label: 'Token' });
            }

            return selector + fields;
        }

        /**
         * Builds the configured engine's Capabilities page URL from the current
         * Connection settings, with sensible fallbacks for any blank part.
         *
         * @returns {string} The full capabilities.html URL.
         */
        function capabilitiesUrl() {
            const server = STATE.g4Server || {};
            const schema = server.schema || 'http';
            const host = server.host || 'localhost';
            const port = server.port || '9944';

            return `${schema}://${host}:${port}/views/capabilities.html`;
        }

        /**
         * Builds the engine's driver-manifests endpoint URL from the current
         * Connection settings.
         *
         * @returns {string} The full drivers API URL.
         */
        function driversUrl() {
            const server = STATE.g4Server || {};
            const schema = server.schema || 'http';
            const host = server.host || 'localhost';
            const port = server.port || '9944';

            return `${schema}://${host}:${port}/api/v4/g4/integration/manifests/drivers`;
        }

        /**
         * Returns the choices for a Driver dropdown: the fetched driver keys (or
         * the static fallback when none are loaded), always including the
         * currently-saved value so it's never silently dropped. The option value
         * and text are both the driver key.
         *
         * @param {string} currentValue - The driver value currently in state.
         * @returns {Array<{value:string,text:string}>} The dropdown choices.
         */
        function driverChoices(currentValue) {
            const source = Array.isArray(DRIVERS) && DRIVERS.length ? DRIVERS : FALLBACK_DRIVERS;
            const keys = source.slice();

            if (currentValue && !keys.includes(currentValue)) {
                keys.unshift(currentValue);
            }

            return keys.map(key => ({ value: key, text: key }));
        }

        /**
         * Fetches the driver manifests from the engine and refreshes every Driver
         * dropdown. Each manifest's `key` becomes a driver option (value === key).
         * On any failure the dropdowns fall back to the static list.
         */
        async function refreshDrivers(button) {
            // Spin the clicked button while the request is in flight. No manual
            // cleanup needed — the section re-render below rebuilds the button.
            if (button) {
                button.disabled = true;
                button.classList.add('is-busy');
            }

            try {
                const response = await fetch(driversUrl(), { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                DRIVERS = Array.isArray(data)
                    ? data.map(manifest => manifest && manifest.key).filter(key => typeof key === 'string' && key)
                    : [];
            } catch (error) {
                console.warn('Could not fetch driver manifests:', error);
                DRIVERS = null;
            }

            // Refresh the driver selects in place, preserving collapse/scroll.
            renderSection('driver');
            renderSection('recorders');
        }

        /**
         * Builds the engine's ping endpoint URL from the current Connection
         * settings.
         *
         * @returns {string} The full ping API URL.
         */
        function pingUrl() {
            const server = STATE.g4Server || {};
            const schema = server.schema || 'http';
            const host = server.host || 'localhost';
            const port = server.port || '9944';

            return `${schema}://${host}:${port}/api/v4/g4/ping`;
        }

        /**
         * Pings the configured engine and reports the result next to the button.
         * While the request is in flight the button is disabled and its icon
         * spins; the label stays "Test connection" throughout.
         *
         * @param {HTMLButtonElement} button - The clicked Test connection button.
         */
        async function testConnection(button) {
            const status = document.getElementById('test-conn-status');
            const setStatus = (message, cls) => {
                if (status) {
                    status.className = 'field-hint' + (cls ? ' ' + cls : '');
                    status.textContent = message;
                }
            };

            if (button) {
                button.disabled = true;
                button.classList.add('is-busy');
            }
            setStatus('Testing…');

            try {
                const response = await fetch(pingUrl(), { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                setStatus('Connected', 'status-ok');
            } catch (error) {
                console.warn('Connection test failed:', error);
                setStatus('Could not connect', 'status-err');
            } finally {
                if (button) {
                    button.disabled = false;
                    button.classList.remove('is-busy');
                }
            }
        }

        /**
         * Renders a note linking to the engine's Capabilities page (the live G4
         * catalog). Used in the Plugins and MCP Servers sections.
         *
         * @returns {string} HTML markup for the capabilities note.
         */
        function writeCapabilitiesNote() {
            const url = capabilitiesUrl();

            return `<div class="field-hint" style="margin-bottom:12px">
                Browse the full G4 catalog on the
                <a href="${clearString(url)}" onclick="return openExternal(this.href)" target="_blank" rel="noopener noreferrer">Capabilities page</a>
                — search plugins, read each plugin's manifest and documentation, and add external or MCP sources.
            </div>`;
        }
    </script>

    <script id="src-sections">
        /**
         * Builds the "Connection" section: where the G4 engine lives.
         *
         * @returns {string} HTML markup for the section.
         */
        function sectionConnection() {
            const body = `
            <div class="field-row">
                ${writeSelect({
                path: 'g4Server.schema',
                label: 'Protocol',
                hint: 'Use HTTPS only if your engine sits behind a secure proxy.',
                choices: [
                    { value: 'http', text: 'HTTP (default)' },
                    { value: 'https', text: 'HTTPS (secure)' }
                ]
            })}
                ${writeText({
                path: 'g4Server.host',
                label: 'Engine address',
                hint: 'The computer running G4. "localhost" means this machine.'
            })}
                ${writeText({
                path: 'g4Server.port',
                label: 'Port',
                hint: 'The network port G4 listens on (default 9944).'
            })}
            </div>
            <div class="add-row" style="display:flex;align-items:center;gap:8px">
                <button type="button" class="btn btn-ghost btn-sm spin-btn" id="test-conn-btn"
                    onclick="testConnection(this)"><span class="btn-label">Test connection</span><span class="btn-spinner">${SVG_REFRESH}</span></button>
                <span class="field-hint" id="test-conn-status"></span>
            </div>`;

            return writeSection({
                id: 'connection',
                title: 'Connection',
                desc: 'Tell G4 where the automation engine is running.',
                body
            });
        }

        /**
         * Builds the "License" section: the token that authorizes the engine.
         *
         * @returns {string} HTML markup for the section.
         */
        function sectionLicense() {
            const body = `
            <p class="field-hint" style="margin-bottom:10px">
                Need a token? Get a free, full-featured license for personal use at
                <a href="https://github.com/g4-api/g4-services#development-license" target="_blank" rel="noopener noreferrer">g4-api/g4-services</a>.
                It renews periodically — when it expires, just request a new one and paste it here.
                If the personal license doesn't work,
                <a href="https://github.com/g4-api/g4-services/issues" target="_blank" rel="noopener noreferrer">open an issue</a>
                and we'll help you out.
            </p>
            <div class="add-row" style="margin-top:0;margin-bottom:4px">
                <button type="button" class="btn btn-ghost btn-sm" id="fetch-token-btn"
                    onclick="fetchDevelopmentLicense()">Fetch free token automatically</button>
                <span class="field-hint" id="fetch-token-status" style="margin-left:8px"></span>
            </div>
            <div class="field-hint" style="margin-bottom:16px">
                Downloads the latest free token from GitHub and fills it in below — no copy/paste needed (requires internet access).
            </div>
            ${writeSecret({
                path: 'authentication.token',
                label: 'License token',
                hint: 'Your private key for the engine. Treat it like a password — never share or post it.'
            })}
            <div class="note">Tip: keep this on one line, with no spaces or line breaks. If you start seeing "unauthorized" errors, your token may have expired.</div>`;

            return writeSection({
                id: 'license',
                title: 'License',
                desc: 'The token that proves you are allowed to use the engine.',
                body
            });
        }

        /**
         * Renders the standard manifest `driverParameters` editor: driver,
         * driver service URL/path, and the alwaysMatch capabilities JSON. Shared
         * by the Default Browser section and each recorder card so they edit the
         * exact same structure.
         *
         * @param {string} base - Dotted state path to the driverParameters object.
         * @returns {string} HTML markup for the driver-parameters controls.
         */
        function writeDriverParameters(base) {
            const driverValue = getPath(STATE, `${base}.driver`);
            const driverOptions = driverChoices(driverValue)

            // Local (stdio) servers are launched as a process; remote servers are

                : writeKeyValue({
                    path: `${base}.env`,
                    label: 'Environment variables',
                    hint: 'Passed to the server process.',
                    keyPlaceholder: 'NAME',
                    valuePlaceholder: 'value',
                    addLabel: 'Add variable',
                    emptyText: 'No environment variables.'

            return `

                    <span class="item-card-title mono">${clearString(name)}</span>
                    <span class="spacer"></span>
                    <button type="button" class="btn btn-ghost btn-sm" onclick="removeServer('${clearString(name)}')">Remove</button>

                <div class="field-row">

    <script id="src-app">
        // The VS Code webview bridge. Acquired once; guarded so the page also
        // renders correctly when opened outside the extension host.
        const VSCODE = (typeof acquireVsCodeApi === 'function')
            ? acquireVsCodeApi()
            : null;

        // The editable working copy of the settings. Cloned from DEFAULTS so the
        // baseline is never mutated and "Reset" can always restore it.
        let STATE = deepCopy(DEFAULTS);

        // Driver keys fetched from the engine; null until a successful load.
        // Used to populate every "Driver" dropdown.
        let DRIVERS = null;

        // Shown when the engine can't be reached so the form stays usable.
        const FALLBACK_DRIVERS = ['ChromeDriver', 'UiaDriver', 'AndroidDriver', 'IosDriver', 'SimulatorDriver'];

        /**
         * Handles a single value change from a bound control.
         *
         * @param {string} path - The dotted state path that changed.
         * @param {*} rawValue - The raw value from the control.
         * @param {('text'|'number'|'bool')} [kind='text'] - How to coerce the value.
         */
        function onInput(path, rawValue, kind = 'text', min) {
            let value = rawValue;

            if (kind === 'number') {
                // Keep the field usable while typing; treat empty as 0.
                const parsed = Number(rawValue);
                value = Number.isFinite(parsed) ? parsed : 0;

                // Enforce a client-side floor so the engine never receives an
                // out-of-range value (it rejects anything <= 0 server-side).
                if (min != null && value < min) {
                    value = min;
                }
            }

            if (kind === 'bool') {
                value = !!rawValue;
            }

            setPath(STATE, path, value);
        }

        /**
         * Computes a validation message for a text field, or '' when it's valid.
         *
         * @param {*} value - The field value.
         * @param {boolean} [required] - Whether the field must be non-empty.
         * @param {string} [rule] - Extra rule: 'url' for a basic URL check.
         * @returns {string} The warning to show, or '' when the value is fine.
         */
        function computeFieldError(value, required, rule) {
            const text = String(value ?? '').trim();

            if (required && !text) {
                return 'Required.';
            }
            if (text && rule === 'url' && !/^https?:\/\/.+/i.test(text)) {
                return 'Enter a valid URL (http:// or https://).';
            }
            return '';
        }

        /**
         * Updates a field's inline warning element as the user types.
         *
         * @param {string} errId - Id of the error element.
         * @param {*} value - The current field value.
         * @param {boolean} required - Whether the field is required.
         * @param {string} rule - Extra validation rule (see computeFieldError).
         */
        function checkField(errId, value, required, rule) {
            const el = document.getElementById(errId);
            if (el) {
                el.textContent = computeFieldError(value, required, rule);
            }
        }

        /**
         * Steps a number field up or down by one, honoring its min/max bounds,
         * then writes the result to state and the visible input.
         *
         * @param {string} path - The dotted state path to adjust.
         * @param {string} inputId - Id of the bound number input.
         * @param {number} dir - +1 to increment, -1 to decrement.
         * @param {number|null} [min] - Lower bound, or null for none.
         * @param {number|null} [max] - Upper bound, or null for none.
         */
        function stepNumber(path, inputId, dir, min, max) {
            const current = Number(getPath(STATE, path));
            let next = (Number.isFinite(current) ? current : 0) + dir;

            if (min != null && next < min) {
                next = min;
            }
            if (max != null && next > max) {
                next = max;
            }

            setPath(STATE, path, next);

            const input = document.getElementById(inputId);
            if (input) {
                input.value = next;
            }
        }

        /**
         * Handles a multi-line list change, mapping non-empty lines to an array.
         *
         * @param {string} path - The dotted state path (string[]).
         * @param {string} rawValue - The textarea contents.
         */
        function onListInput(path, rawValue) {
            const list = String(rawValue || '')
                .split('\n')
                .map(line => line.trim())
                .filter(Boolean);

            setPath(STATE, path, list);
        }

        /**
         * Handles a JSON editor change: parses the text and writes the resulting
         * value to state, or reports an inline error and keeps the last good
         * value when the text isn't valid JSON.
         *
         * @param {string} path - The dotted state path to write.
         * @param {string} rawValue - The textarea contents.
         * @param {string} [errId] - Id of the element that shows parse errors.
         */
        function onJsonInput(path, rawValue, errId) {
            const errEl = errId ? document.getElementById(errId) : null;
            const text = String(rawValue ?? '').trim();

            const setError = message => {
                if (errEl) {
                    errEl.textContent = message;
                }
            };

            // An empty box means "no value here" — store an empty object.
            if (!text) {
                setPath(STATE, path, {});
                setError('');
                return;
            }

            try {
                setPath(STATE, path, JSON.parse(text));
                setError('');
            } catch (error) {
                setError('Invalid JSON — fix the highlighted text; this change won’t be saved until it parses.');
            }
        }

        /**
         * Validates and pretty-prints the JSON in a textarea (4-space indent).
         *
         * On success it rewrites the textarea and stores the parsed value; on
         * failure it leaves the text as-is and shows an inline error.
         *
         * @param {string} taId - Id of the JSON textarea.
         * @param {string} path - The dotted state path the editor binds to.
         * @param {string} [errId] - Id of the element that shows parse errors.
         */
        function formatJson(taId, path, errId) {
            const textarea = document.getElementById(taId);
            const errEl = errId ? document.getElementById(errId) : null;
            if (!textarea) {
                return;
            }

            const text = String(textarea.value ?? '').trim();
            const setError = message => {
                if (errEl) {
                    errEl.textContent = message;
                }
            };

            if (!text) {
                setPath(STATE, path, {});
                setError('');
                return;
            }

            try {
                const parsed = JSON.parse(text);
                textarea.value = JSON.stringify(parsed, null, 4);
                setPath(STATE, path, parsed);
                setError('');
            } catch (error) {
                setError('Invalid JSON — fix the highlighted text before formatting.');
            }
        }

        /**
         * Reveals or masks a secret input and updates the toggle button label.
         *
         * @param {string} inputId - The id of the password input.
         * @param {HTMLButtonElement} button - The clicked toggle button.
         */
        function toggleSecret(inputId, button) {
            const input = document.getElementById(inputId);
            if (!input) {
                return;
            }

            const reveal = input.type === 'password';
            input.type = reveal ? 'text' : 'password';
            button.textContent = reveal ? 'Hide' : 'Show';
        }

        /**
         * Adds a new desktop recorder seeded from the shipped recorder template.
         */
        function addRecorder() {
            const recorders = STATE.settings.recorderSettings.recorders;
            const template = deepCopy(DEFAULTS.settings.recorderSettings.recorders[0]);

            // Give the new machine a unique friendly name and leave it disabled
            // so adding it never changes behavior until the user opts in.
            template.enabled = false;
            template.driverParameters.capabilities.alwaysMatch['uia:options'].label =
                'machine-' + (recorders.length + 1);

            recorders.push(template);
            renderSection('recorders');
            revealItem(document.querySelector('#sec-recorders .card-list')?.lastElementChild);
        }

        /**
         * Removes a desktop recorder by index.
         *
         * @param {number} index - The recorder index to remove.
         */
        function removeRecorder(index) {
            STATE.settings.recorderSettings.recorders.splice(index, 1);
            renderSection('recorders');
        }

        /**
         * Adds a new, empty MCP server entry with a unique placeholder name.
         */
        function addServer() {
            const servers = getPath(STATE, 'settings.pluginsSettings.servers') || {};

            // Find a unique default name so two new servers don't collide.
            let n = Object.keys(servers).length + 1;
            let name = 'server-' + n;
            while (servers[name]) {
                name = 'server-' + (++n);
            }

            servers[name] = { type: 'stdio', command: '', args: [] };
            setPath(STATE, 'settings.pluginsSettings.servers', servers);
            renderSection('mcp');
            revealItem(document.querySelector('#sec-mcp .card-list')?.lastElementChild);
        }

        /**
         * Removes an MCP server by name.
         *
         * @param {string} name - The server key to remove.
         */
        function removeServer(name) {
            const servers = getPath(STATE, 'settings.pluginsSettings.servers');
            if (servers) {
                delete servers[name];
            }
            renderSection('mcp');
        }

        /**
         * Renames an MCP server while preserving its position and definition.
         *
         * @param {string} oldName - The current server key.
         * @param {string} newNameRaw - The requested new key.
         */
        function renameServer(oldName, newNameRaw) {
            const newName = String(newNameRaw || '').trim();
            const servers = getPath(STATE, 'settings.pluginsSettings.servers') || {};

            // Ignore no-op or empty renames, and refuse to overwrite an existing key.
            if (!newName || newName === oldName || servers[newName]) {
                renderSection('mcp');
                return;
            }

            // Rebuild the object so the renamed key keeps its original order.
            const next = {};
            for (const [key, value] of Object.entries(servers)) {
                next[key === oldName ? newName : key] = value;
            }
            setPath(STATE, 'settings.pluginsSettings.servers', next);
            renderSection('mcp');
        }

        /**
         * Switches an MCP server's transport type and re-renders so the matching
         * local/remote fields appear.
         *
         * @param {string} name - The server key.
         * @param {string} type - The chosen transport ('stdio' | 'http' | 'sse').
         */
        function onServerTypeChange(name, type) {
            setPath(STATE, `settings.pluginsSettings.servers.${escapeKey(name)}.type`, type);
            renderSection('mcp');
        }

        /**
         * Adds an empty entry to the string→string map at `path`, with a unique
         * placeholder key.
         *
         * @param {string} path - Dotted state path to the map object.
         */
        function addEntry(path) {
            const map = getPath(STATE, path) || {};

            let n = Object.keys(map).length + 1;
            let key = 'key-' + n;
            while (key in map) {
                key = 'key-' + (++n);
            }

            map[key] = '';
            setPath(STATE, path, map);
            renderSection(sectionIdForPath(path));
            revealItem(document.getElementById('kv-' + path.replace(/[^a-z0-9]/gi, '-'))?.lastElementChild);
        }

        /**
         * Removes an entry by key from the map at `path`.
         *
         * @param {string} path - Dotted state path to the map object.
         * @param {string} key - The entry key to remove.
         */
        function removeEntry(path, key) {
            const map = getPath(STATE, path);
            if (map && typeof map === 'object') {
                delete map[key];
            }
            renderSection(sectionIdForPath(path));
        }

        /**
         * Updates the value of an existing entry in the map at `path`.
         *
         * @param {string} path - Dotted state path to the map object.
         * @param {string} key - The entry key.
         * @param {string} value - The new value.
         */
        function setEntryValue(path, key, value) {
            setPath(STATE, `${path}.${escapeKey(key)}`, value);
        }

        /**
         * Renames an entry key in the map at `path`, preserving order. Ignores
         * empty, unchanged, or colliding names.
         *
         * @param {string} path - Dotted state path to the map object.
         * @param {string} oldKey - The current entry key.
         * @param {string} newKeyRaw - The requested new key.
         */
        function renameEntryKey(path, oldKey, newKeyRaw) {
            const newKey = String(newKeyRaw || '').trim();
            const map = getPath(STATE, path) || {};

            if (!newKey || newKey === oldKey || (newKey in map)) {
                renderSection(sectionIdForPath(path));
                return;
            }

            const next = {};
            for (const [key, value] of Object.entries(map)) {
                next[key === oldKey ? newKey : key] = value;
            }
            setPath(STATE, path, next);
            renderSection(sectionIdForPath(path));
        }

        /**
         * Classifies a credentials object into a UI auth type.
         *
         * @param {object|null} cred - The stored credentials value.
         * @returns {('none'|'basic'|'bearer')} The detected auth type.
         */
        function credentialsType(cred) {
            if (!cred || typeof cred !== 'object') {
                return 'none';
            }
            if (cred.type === 'basic' || cred.type === 'bearer') {
                return cred.type;
            }
            if (cred.token != null) {
                return 'bearer';
            }
            if (cred.username != null || cred.password != null) {
                return 'basic';
            }
            return 'none';
        }

        /**
         * Switches the credentials auth type at `path`, preserving any reusable
         * fields, then re-renders so the matching inputs appear.
         *
         * @param {string} path - Dotted state path to the credentials object.
         * @param {('none'|'basic'|'bearer')} type - The chosen auth type.
         */
        function setCredentialsType(path, type) {
            const current = getPath(STATE, path) || {};

            if (type === 'basic') {
                setPath(STATE, path, {
                    type: 'basic',
                    username: current.username || '',
                    password: current.password || ''
                });
            } else if (type === 'bearer') {
                setPath(STATE, path, { type: 'bearer', token: current.token || '' });
            } else {
                setPath(STATE, path, null);
            }

            renderSection(sectionIdForPath(path));
        }

        /**
         * Adds a new external plugin repository seeded with sensible defaults.
         */
        function addRepository() {
            const existing = getPath(STATE, 'settings.pluginsSettings.externalRepositories');
            const repos = Array.isArray(existing) ? existing : [];

            repos.push({ name: '', url: '', version: 1, timeout: 300, capabilities: {}, headers: {} });
            setPath(STATE, 'settings.pluginsSettings.externalRepositories', repos);
            renderSection('plugins');
            revealItem(document.querySelector('#sec-plugins .card-list')?.lastElementChild);
        }

        /**
         * Removes an external plugin repository by index.
         *
         * @param {number} index - The repository index to remove.
         */
        function removeRepository(index) {
            const repos = getPath(STATE, 'settings.pluginsSettings.externalRepositories');
            if (Array.isArray(repos)) {
                repos.splice(index, 1);
            }
            renderSection('plugins');
        }

        /**
         * Builds a clean manifest object from the current state.
         *
         * Behavior:
         * - Clamps maxParallel to a valid floor (the engine rejects values <= 0).
         * - Drops the optional MCP `servers` block when it is empty.
         *
         * @returns {object} A manifest-shaped object ready to send to the host.
         */
        function buildManifest() {
            const manifest = deepCopy(STATE);

            // Safety net: never send a parallelism below 1, even if state drifts.
            const parallel = Number(manifest.settings.automationSettings.maxParallel);
            manifest.settings.automationSettings.maxParallel =
                Number.isFinite(parallel) && parallel >= 1 ? parallel : 1;

            // Keep the optional MCP servers block out of the file when unused.
            const servers = manifest.settings?.pluginsSettings?.servers;
            if (servers && Object.keys(servers).length === 0) {
                delete manifest.settings.pluginsSettings.servers;
            }

            // Mirror the base manifest: an empty repository list is stored as null.
            const repos = manifest.settings?.pluginsSettings?.externalRepositories;
            if (Array.isArray(repos) && repos.length === 0) {
                manifest.settings.pluginsSettings.externalRepositories = null;
            }

            return manifest;
        }

        // Raw README that hosts the free development-license token. The token
        // lives in a ```none code block right under the "Development License"
        // heading. raw.githubusercontent.com serves permissive CORS headers,
        // so the webview can read it directly.
        const DEV_LICENSE_URL =
            'https://raw.githubusercontent.com/g4-api/g4-services/main/README.md';

        /**
         * Pulls the token string out of the development-license README.
         *
         * Prefers the fenced ```none block that follows the "Development License"
         * heading, and falls back to the first long base64-looking run so a minor
         * change to the surrounding markdown doesn't break extraction.
         *
         * @param {string} markdown - The raw README contents.
         * @returns {string|null} The extracted token, or null when none is found.
         */
        function extractDevelopmentToken(markdown) {
            const text = String(markdown || '');

            // Scope the search to the Development License section when present.
            const headingAt = text.search(/##\s*Development License/i);
            const region = headingAt >= 0 ? text.slice(headingAt) : text;

            // Preferred: the explicit ```none ... ``` fenced block.
            const fenced = region.match(/```none\s*\r?\n([\s\S]*?)\r?\n```/i);
            if (fenced && fenced[1].trim()) {
                return fenced[1].trim();
            }

            // Fallback: the first long base64-ish token in the section.
            const loose = region.match(/[A-Za-z0-9+/]{200,}={0,2}/);
            return loose ? loose[0] : null;
        }

        /**
         * Opens a URL in the computer's default browser.
         *
         * Inside the VS Code host this delegates to the extension (which calls
         * vscode.env.openExternal), so links open in the OS browser rather than
         * inside VS Code — and returns false to cancel the in-webview navigation.
         * Outside the host it returns true so a normal browser follows the link.
         *
         * @param {string} url - The URL to open.
         * @returns {boolean} false when handled by the host, true otherwise.
         */
        function openExternal(url) {
            if (VSCODE) {
                VSCODE.postMessage({ command: 'openExternal', url });
                return false;
            }
            return true;
        }

        /**
         * Fetches the free development-license token from GitHub and drops it into
         * the token field. Requires internet access to github.com; on any failure
         * it leaves the field untouched and points the user at the manual link.
         */
        async function fetchDevelopmentLicense() {
            const button = document.getElementById('fetch-token-btn');
            const status = document.getElementById('fetch-token-status');

            const setStatus = message => {
                if (status) {
                    status.textContent = message;
                }
            };

            if (button) {
                button.disabled = true;
            }
            setStatus('Fetching the latest free token…');

            try {
                const response = await fetch(DEV_LICENSE_URL, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`GitHub returned ${response.status}`);
                }

                const token = extractDevelopmentToken(await response.text());
                if (!token) {
                    throw new Error('token not found in page');
                }

                // Update both the working state and the visible input.
                setPath(STATE, 'authentication.token', token);
                const input = document.getElementById('secret-authentication-token');
                if (input) {
                    input.value = token;
                }

                setStatus('Free token added. Click Save to apply it.');
            } catch (error) {
                console.warn('Could not fetch development license:', error);
                setStatus('Couldn’t reach GitHub — grab the token manually from the link below, then paste it here.');
            } finally {
                if (button) {
                    button.disabled = false;
                }
            }
        }

        /**
         * Serializes the current settings and sends them to the extension host.
         * No-ops gracefully (with a console note) when run outside the host.
         */
        function save() {
            const manifest = buildManifest();

            if (VSCODE) {
                VSCODE.postMessage({ command: 'saveSettings', manifest });
            } else {
                console.warn('VS Code bridge unavailable; settings were not sent.', manifest);
            }

            // Give the user immediate feedback regardless of host wiring.
            const note = document.getElementById('save-note');
            if (note) {
                note.classList.add('show');
                setTimeout(() => note.classList.remove('show'), 2000);
            }
        }

        /**
         * Resets all settings back to the shipped defaults and re-renders.
         */
        function resetDefaults() {
            STATE = deepCopy(DEFAULTS);
            render();
        }

        // Maps each section id to the function that builds its full markup, so a
        // single section can be re-rendered in place without rebuilding the page.
        const SECTION_BUILDERS = {
            connection: sectionConnection,
            license: sectionLicense,
            driver: sectionDriver,
            run: sectionRunBehavior,
            logging: sectionLogging,
            reports: sectionReports,
            response: sectionResponseData,
            screenshots: sectionScreenshots,
            plugins: sectionPlugins,
            mcp: sectionMcp,
            recorders: sectionRecorders
        };

        /**
         * Re-renders a single section's body in place. Every other section — and
         * this section's own collapsed/expanded state and the page scroll
         * position — is left untouched, because only the inner content of the
         * live body element is swapped (its display style, which encodes
         * collapse, never changes).
         *
         * @param {string} id - The section id (e.g. 'plugins').
         */
        function renderSection(id) {
            const liveBody = document.getElementById('sec-' + id);
            const builder = SECTION_BUILDERS[id];
            if (!liveBody || !builder) {
                return;
            }

            // Build the section fresh off-DOM, then copy just its body content.
            const scratch = document.createElement('div');
            scratch.innerHTML = builder();

            const freshBody = scratch.querySelector('#sec-' + id);
            if (freshBody) {
                liveBody.innerHTML = freshBody.innerHTML;
            }
        }

        /**
         * Resolves which section owns a given state path, for path-based edits
         * (headers, credentials) that need to know what to re-render.
         *
         * @param {string} path - A dotted state path.
         * @returns {string|null} The owning section id, or null if unknown.
         */
        function sectionIdForPath(path) {
            if (path.startsWith('settings.pluginsSettings.servers')) {
                return 'mcp';
            }
            if (path.startsWith('settings.pluginsSettings')) {
                return 'plugins';
            }
            if (path.startsWith('settings.recorderSettings')) {
                return 'recorders';
            }
            return null;
        }

        /**
         * Scrolls a freshly added item into view and focuses its first editable
         * field.
         *
         * @param {Element|null} el - The item element to reveal.
         */
        function revealItem(el) {
            if (!el) {
                return;
            }
            el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            const field = el.querySelector('input[type=text], input[type=number], input[type=password], textarea, select');
            if (field) {
                field.focus();
            }
        }

        /**
         * Renders the header and the full settings form from the current state.
         */
        function render() {
            document.getElementById('g4-header').innerHTML = `
            <div class="header">
                <div>
                    <div class="header-title">G4&#x2122; Settings</div>
                    <div class="header-meta">Configure how the automation engine runs</div>
                </div>
            </div>`;

            const sections = [
                sectionConnection(),
                sectionLicense(),
                sectionDriver(),
                sectionRunBehavior(),
                sectionLogging(),
                sectionReports(),
                sectionResponseData(),
                sectionScreenshots(),
                sectionPlugins(),
                sectionMcp(),
                sectionRecorders()
            ].join('');

            document.getElementById('app').innerHTML = `
            <div class="main">
                ${sections}
                <div style="height:8px"></div>
            </div>`;

            document.getElementById('g4-actionbar').innerHTML = `
            <div class="actionbar">
                <button type="button" class="btn" onclick="save()">Save</button>
                <button type="button" class="btn btn-ghost" onclick="resetDefaults()">Reset to defaults</button>
                <span class="spacer"></span>
                <span class="save-note" id="save-note">Settings sent.</span>
            </div>`;
        }

        // Initial render.
        render();

        // Populate the Driver dropdowns from the engine (best effort).
        refreshDrivers();
    </script>
</body>

</html>
