<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4™ Automation Report</title>
    <!-- layout -->
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        @font-face {
            font-family: 'Inter';
            src: url('../fonts/inter-variable.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap
        }

        html {
            height: 100%
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 14px
        }

        #app {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-gutter: stable
        }

        .header-title {
            font-size: 16px;
            font-weight: 700
        }

        .header-meta {
            font-size: 11px;
            margin-top: 1px
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .main {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px
        }

        .card {
            padding: 14px 16px
        }

        .card-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 5px
        }

        .card-value {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums
        }

        .section {
            overflow: hidden
        }

        .section-hdr {
            padding: 10px 16px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .section-body {
            padding: 16px
        }

        .session-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 16px
        }

        .si-item {
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .si-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .06em
        }

        .si-value {
            font-size: 12px;
            font-family: 'Consolas', monospace
        }

        /* tree */
        .plugin-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            cursor: pointer
        }

        .p-toggle {
            width: 13px;
            height: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            flex-shrink: 0
        }

        .p-badge {
            font-size: 9px;
            padding: 1px 5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            flex-shrink: 0;
            white-space: nowrap
        }

        .p-name {
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0
        }

        .p-arg {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0
        }

        .p-elem {
            font-family: 'Consolas', monospace;
            font-size: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0
        }

        .p-spacer {
            flex: 1
        }

        .p-bar-wrap {
            width: 72px;
            height: 5px;
            overflow: hidden;
            flex-shrink: 0
        }

        .p-bar {
            height: 100%;
            min-width: 2px
        }

        .p-dur {
            font-size: 10px;
            white-space: nowrap;
            text-align: right;
            min-width: 52px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums
        }

        .p-dot {
            width: 7px;
            height: 7px;
            flex-shrink: 0
        }

        .p-led {
            width: 8px;
            height: 8px;
            flex-shrink: 0
        }

        .p-children {
            margin-left: 18px
        }

        .p-children.hidden {
            display: none
        }

        /* timeline */
        .tl-wrap {
            overflow-x: auto
        }

        /* assertions */
        .assert-tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        .assert-tbl th {
            text-align: left;
            padding: 7px 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            font-size: 10px
        }

        .assert-tbl td {
            padding: 7px 12px;
            vertical-align: middle
        }

        .reason {
            font-size: 11px
        }

        /* tags */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 2px 7px;
            font-weight: 600;
            line-height: 1.6
        }

        /* chevron */
        .chev {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-style: normal
        }

        .chev .chev-r {
            display: block
        }

        .chev .chev-d {
            display: none
        }

        .chev.open .chev-r {
            display: none
        }

        .chev.open .chev-d {
            display: block
        }

        .mono {
            font-family: 'Consolas', monospace
        }

        .no-data {
            font-style: italic;
            padding: 16px;
            text-align: center
        }

        /* cards */
        .cards-5   { grid-template-columns: repeat(5, 1fr) }
        .cards-6   { grid-template-columns: repeat(6, 1fr) }
        .cards-req { margin-bottom: 20px }

        /* tree */
        .p-toggle-spacer { visibility: hidden; display: inline-flex; width: 13px; height: 13px; flex-shrink: 0 }
        .tree-stage     { margin-bottom: 16px }
        .tree-stage-hdr { display: flex; align-items: center; gap: 8px; padding: 8px 4px; font-weight: 700; font-size: 13px; cursor: pointer }
        .tree-job       { margin-left: 18px; margin-bottom: 8px }
        .tree-job-hdr   { display: flex; align-items: center; gap: 8px; padding: 6px 4px; font-size: 12px; font-weight: 600; cursor: pointer }
        .meta-text      { font-weight: 400; font-size: 11px }

        /* svg */
        .svg-block { display: block }

        /* table */
        .td-center { text-align: center }

        /* sections */
        .section-mt    { margin-top: 14px }
        .section-mt-lg { margin-top: 20px }

        /* error state */
        .error-body  { padding: 32px; text-align: center }
        .error-title { font-size: 14px; font-weight: 600; margin-bottom: 8px }
        .error-desc  { font-size: 12px }
        .code-tag    { padding: 1px 5px }

        /* session view */
        .session-title-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px }
        .session-label     { font-weight: 700; font-size: 14px }
        .session-id        { font-size: 12px }
        .assert-count      { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; margin-left: 4px }
        .session-divider   { margin: 28px 0 }
    </style>

    <!-- colors -->
    <style>
        body {
            background-color: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground)
        }

        .header {
            background-color: var(--vscode-editorGroupHeader-tabsBackground);
            border-bottom: 1px solid var(--vscode-panel-border)
        }

        .card {
            background-color: var(--vscode-editor-background);
            border: 1px solid var(--vscode-panel-border)
        }

        .card-label {
            color: var(--vscode-descriptionForeground)
        }

        .section {
            border: 1px solid var(--vscode-panel-border)
        }

        .section-hdr {
            background-color: var(--vscode-sideBar-background);
            border-bottom: 1px solid var(--vscode-panel-border)
        }

        .section-hdr:has(.chev:not(.open)) {
            border-bottom: none
        }

        .si-label {
            color: var(--vscode-descriptionForeground)
        }

        .plugin-row:hover {
            background-color: var(--vscode-list-hoverBackground)
        }

        .p-arg  { color: var(--vscode-descriptionForeground) }
        .p-elem { color: var(--vscode-descriptionForeground) }
        .p-dur  { color: var(--vscode-descriptionForeground) }

        .p-badge {
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            border: 1px solid var(--vscode-panel-border)
        }

        .p-bar-wrap { border: 1px solid var(--vscode-panel-border) }
        .p-dot      { border: 1px solid var(--vscode-panel-border) }

        .tag-pass    { border: 1px solid var(--vscode-testing-iconPassed) }
        .tag-fail    { border: 1px solid var(--vscode-testing-iconFailed) }
        .tag-neutral {
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            border: 1px solid var(--vscode-panel-border)
        }

        .assert-tbl th {
            background-color: var(--vscode-sideBar-background);
            color: var(--vscode-descriptionForeground);
            border-bottom: 1px solid var(--vscode-panel-border)
        }

        .assert-tbl td          { border-bottom: 1px solid var(--vscode-panel-border) }
        .assert-tbl tr:last-child td { border-bottom: none }
        .assert-tbl tr:hover td { background-color: var(--vscode-list-hoverBackground) }

        .no-data         { color: var(--vscode-descriptionForeground) }
        .error-body      { border: 1px solid }
        .session-divider { border-top: 1px solid }
    </style>
</head>

    <script>
        const DATA = JSON.parse(document.getElementById('g4-data').value);
        const SVG_CHEV = `<svg class="chev-r" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="13" height="13"><path fill="currentColor" d="M441.3 299.8C451.5 312.4 450.8 330.9 439.1 342.6L311.1 470.6C301.9 479.8 288.2 482.5 276.2 477.5C264.2 472.5 256.5 460.9 256.5 448L256.5 192C256.5 179.1 264.3 167.4 276.3 162.4C288.3 157.4 302 160.2 311.2 169.3L439.2 297.3L441.4 299.7z"/></svg><svg class="chev-d" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="13" height="13"><path fill="currentColor" d="M300.3 440.8C312.9 451 331.4 450.3 343.1 438.6L471.1 310.6C480.3 301.4 483 287.7 478 275.7C473 263.7 461.4 256 448.5 256L192.5 256C179.6 256 167.9 263.8 162.9 275.8C157.9 287.8 160.7 301.5 169.9 310.6L297.9 438.6L300.3 440.8z"/></svg>`;

        function tickMs(t) { return t / 10000; }

        function fmtDur(ticks) {
            if (ticks == null) return '—';
            const m = tickMs(ticks);
            if (m >= 1000) return (m / 1000).toFixed(2) + ' s';
            if (m >= 1) return m.toFixed(0) + ' ms';
            return '< 1 ms';
        }

        function fmtBytes(b) {
            if (b == null) return '—';
            return b >= 1024 ? (b / 1024).toFixed(1) + ' KB' : b + ' B';
        }

        function fmtDateTime(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'medium' });
        }

        function fmtTime(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
        }

        function esc(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function trunc(s, n) {
            s = String(s ?? '');
            return s.length > n ? s.slice(0, n) + '…' : s;
        }



        function refType(plugin) {
            return plugin.performancePoint?.reference?.type || 'Action';
        }

        function collectAll(plugins, out = []) {
            for (const p of (plugins || [])) {
                out.push(p);
                collectAll(p.plugins, out);
            }
            return out;
        }

        function collectAssertions(plugins, out = []) {
            for (const p of (plugins || [])) {
                for (const ext of (p.extractions || [])) {
                    for (const ent of (ext.entities || [])) {
                        out.push({
                            content: ent.content || {},
                            onElement: p.rule?.onElement || '',
                            session: ext.session
                        });
                    }
                }
                collectAssertions(p.plugins, out);
            }
            return out;
        }

        function findMachineInfo(stages) {
            for (const stage of (stages || [])) {
                for (const job of (stage.jobs || [])) {
                    for (const p of collectAll(job.plugins)) {
                        for (const ext of (p.extractions || [])) {
                            if (ext.session?.machineName) return ext.session;
                        }
                    }
                }
            }
            return null;
        }

        // ── stat cards ─────────────────────────────────────────────────────────────

        function renderCards(pp, stages) {
            const allJobs = stages.flatMap(s => s.jobs || []);
            const allPlugs = allJobs.flatMap(j => collectAll(j.plugins));
            const asserts = allJobs.flatMap(j => collectAssertions(j.plugins));
            const fails = asserts.filter(a => a.content?.Evaluation === false).length;
            const exceptions = allPlugs.reduce((sum, p) => sum + (p.exceptions || []).length, 0);
            const avgTicks = allPlugs.length > 0 ? pp.runTime / allPlugs.length : null;
            const timeoutTicks = allPlugs
                .filter(p => (p.exceptions || []).some(e => (e.type || '').includes('Timeout')))
                .reduce((sum, p) => sum + (p.performancePoint?.runTime || 0), 0);

            const items = [
                { label: 'Total Runtime',     value: fmtDur(pp.runTime) },
                { label: 'Avg. Action Time',  value: avgTicks != null ? fmtDur(avgTicks) : '—' },
                { label: 'Total Actions',     value: String(allPlugs.length) },
                { label: 'Total Exceptions',  value: String(exceptions) },
                { label: 'Failed Assertions', value: String(fails) },
                { label: 'Total Timeouts',    value: timeoutTicks > 0 ? fmtDur(timeoutTicks) : '—' },
            ];

            return `
  <div class="cards cards-6">
    ${items.map(c => `<div class="card"><div class="card-label">${esc(c.label)}</div><div class="card-value">${esc(c.value)}</div></div>`).join('')}
  </div>`;
        }

        // ── plugin tree ─────────────────────────────────────────────────────────────

        let _pid = 0;

        function renderExceptions(exceptions, depth) {
            const rows = exceptions.map(ex => `<tr>
      <td class="mono">${esc(ex.pluginName || '?')}</td>
      <td class="mono">${esc(ex.type || '—')}</td>
      <td>${esc(ex.exception?.Message || '—')}</td>
      <td class="reason">${esc(ex.reasonPhrase || '—')}</td>
    </tr>`).join('');
            return `<div style="padding-left:${6 + depth * 20 + 27}px;padding-right:8px;padding-bottom:4px">
    <table class="assert-tbl">
      <thead><tr><th>Plugin</th><th>Type</th><th>Message</th><th>Reason</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
        }

        function renderPlugin(plugin, depth, jobRunTime) {
            const id = 'p' + (_pid++);
            const ref = plugin.performancePoint?.reference || {};
            const pp = plugin.performancePoint || {};
            const rule = plugin.rule || {};
            const type = ref.type || 'Action';
            const name = ref.name || rule.pluginName || '?';
            const display = rule.capabilities?.displayName || name;
            const arg = rule.argument || '';
            const elem = rule.onElement || '';
            const rt = pp.runTime || 0;
            const barPct = jobRunTime > 0 ? Math.min(100, (tickMs(rt) / tickMs(jobRunTime)) * 100) : 0;
            const hasKids = (plugin.plugins || []).length > 0;
            const excs = plugin.exceptions || [];
            const hasTimeout = excs.some(e => (e.type || '').includes('Timeout'));
            const ledFill = excs.length === 0 ? '#22c55e'
                          : hasTimeout       ? '#eab308'
                          : '#ef4444';

            const kidsHtml = hasKids
                ? `<div class="p-children hidden" id="ck-${id}">${(plugin.plugins || []).map(c => renderPlugin(c, depth + 1, rt || jobRunTime)).join('')}</div>`
                : '';
            const excHtml = excs.length > 0 ? renderExceptions(excs, depth) : '';

            const descTitle = ref.description ? esc(trunc(ref.description, 200)) : '';

            return `<div>
    <div class="plugin-row" style="padding-left:${6 + depth * 20}px" onclick="togPlugin('${id}')" title="${descTitle}">
      <div class="p-toggle">${hasKids ? `<i class="chev" id="ci-${id}">${SVG_CHEV}</i>` : '<span class="p-toggle-spacer"></span>'}</div>
      <svg class="p-led" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="8" height="8"><path fill="${ledFill}" d="M64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320z"/></svg>
      <span class="p-name">${esc(display)}</span>
      ${arg ? `<span class="p-arg">${esc(trunc(arg, 55))}</span>` : ''}
      ${elem ? `<span class="p-elem">&#x2022; ${esc(trunc(elem, 40))}</span>` : ''}
      <span class="p-spacer"></span>
      <div class="p-bar-wrap"><div class="p-bar bar-${esc(type)}" style="width:${barPct.toFixed(1)}%"></div></div>
      <span class="p-dur">${fmtDur(rt)}</span>
    </div>
    ${excHtml}
    ${kidsHtml}
  </div>`;
        }

        function renderTree(stages) {
            if (!stages?.length) return '<div class="no-data">No stages.</div>';
            return stages.map(stage => {
                const jobs = stage.jobs || [];
                return `<div class="tree-stage">
      <div class="tree-stage-hdr"
           onclick="togEl('st-${esc(stage.id)}','si-${esc(stage.id)}')">
        <i class="chev open" id="si-${esc(stage.id)}">${SVG_CHEV}</i>
                ${esc(stage.name)}
        <span class="meta-text">${jobs.length} job${jobs.length !== 1 ? 's' : ''}</span>
      </div>
      <div id="st-${esc(stage.id)}">
        ${jobs.map(job => {
                    const plugins = job.plugins || [];
                    const jobRt = job.performancePoint?.runTime || 0;
                    return `<div class="tree-job">
            <div class="tree-job-hdr"
                 onclick="togEl('jb-${esc(job.id)}','ji-${esc(job.id)}')">
              <i class="chev open" id="ji-${esc(job.id)}">${SVG_CHEV}</i>
                            ${esc(job.name)}
              <span class="meta-text">${plugins.length} plugin${plugins.length !== 1 ? 's' : ''} &bull; ${fmtDur(jobRt)}</span>
            </div>
            <div id="jb-${esc(job.id)}">
              ${plugins.map(p => renderPlugin(p, 0, jobRt)).join('')}
            </div>
          </div>`;
                }).join('')}
      </div>
    </div>`;
            }).join('');
        }

        // ── timeline ────────────────────────────────────────────────────────────────

        function renderTimeline(stages, sessionStart, sessionEnd) {
            const t0 = new Date(sessionStart).getTime();
            const t1 = new Date(sessionEnd).getTime();
            const span = Math.max(t1 - t0, 1);

            const ROW = 24, LW = 155, CW = 680, DW = 80, PAD = 6;

            function flatPlugins(plugins, depth, out) {
                for (const p of (plugins || [])) {
                    const ref = p.performancePoint?.reference || {};
                    const name = ref.name || p.rule?.pluginName || '?';
                    const type = ref.type || 'Action';
                    const s = new Date(p.performancePoint?.start || sessionStart).getTime();
                    const e = new Date(p.performancePoint?.end || sessionEnd).getTime();
                    out.push({ name, type, depth, s, e });
                    flatPlugins(p.plugins, depth + 1, out);
                }
            }

            const rows = [];
            for (const stage of (stages || []))
                for (const job of (stage.jobs || []))
                    flatPlugins(job.plugins, 0, rows);

            if (!rows.length) return '<div class="no-data">No timeline data.</div>';

            const svgH = ROW * rows.length + 20 + PAD * 2;
            const TICKS = 6;

            const axisTicks = Array.from({ length: TICKS + 1 }, (_, i) => {
                const x = LW + (i / TICKS) * CW;
                const ms = (i / TICKS) * span;
                const lbl = ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : Math.round(ms) + 'ms';
                return `<line x1="${x}" y1="${PAD}" x2="${x}" y2="${PAD + ROW * rows.length}" stroke="currentColor" stroke-width="1" opacity="0.15"/>
      <text x="${x}" y="${PAD + ROW * rows.length + 14}" text-anchor="middle" fill="currentColor" font-size="10" font-family="Segoe UI,sans-serif">${lbl}</text>`;
            }).join('');

            const rowsSvg = rows.map((r, i) => {
                const y = PAD + i * ROW;
                const xS = LW + ((r.s - t0) / span) * CW;
                const w = Math.max(3, ((r.e - r.s) / span) * CW);
                const dur = fmtDur((r.e - r.s) * 10000);
                const lx = LW - 4 - r.depth * 14;
                return `<text x="${lx}" y="${y + ROW / 2 + 4}" text-anchor="end" fill="currentColor" font-size="11" font-family="Segoe UI,sans-serif">${esc(trunc(r.name, 18))}</text>
      <rect x="${xS.toFixed(1)}" y="${y + 5}" width="${w.toFixed(1)}" height="${ROW - 10}" fill="currentColor">
        <title>${esc(r.name)}: ${dur} (${fmtTime(new Date(r.s).toISOString())} – ${fmtTime(new Date(r.e).toISOString())})</title>
      </rect>
      <text x="${LW + CW + 6}" y="${y + ROW / 2 + 4}" text-anchor="start" fill="currentColor" font-size="10" font-family="Segoe UI,sans-serif">${dur}</text>`;
            }).join('');

            return `<div class="tl-wrap">
    <svg class="svg-block" width="${LW + CW + DW + PAD}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
      ${axisTicks}
      ${rowsSvg}
    </svg>
  </div>`;
        }

        // ── assertions table ────────────────────────────────────────────────────────

        function renderAssertions(assertions) {
            if (!assertions.length) return '<div class="no-data">No assertion data found.</div>';
            const rows = assertions.map(a => {
                const c = a.content;
                const ev = c.Evaluation;
                const ledFill = ev === true ? '#22c55e' : ev === false ? '#ef4444' : 'currentColor';
                const ledSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="10" height="10"><path fill="${ledFill}" d="M64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320z"/></svg>`;
                return `<tr>
      <td class="mono">${esc(a.onElement || '—')}</td>
      <td class="mono">${esc(c.Condition || '—')}</td>
      <td class="mono">${esc(c.Operator || '—')}</td>
      <td class="mono">${esc(c.Expected ?? '—')}</td>
      <td class="mono">${esc(String(c.Actual ?? '—'))}</td>
      <td class="td-center">${ledSvg}</td>
      <td class="reason">${esc(c.ReasonPhrase || '—')}</td>
    </tr>`;
            }).join('');
            return `<table class="assert-tbl">
    <thead><tr>
      <th>Element</th><th>Condition</th><th>Operator</th>
      <th>Expected</th><th>Actual</th><th>Result</th><th>Reason Phrase</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
        }

        // ── header ──────────────────────────────────────────────────────────────────

        function renderHeader(automationRef, pp) {
            const name = automationRef.name || 'Untitled Automation';
            return `<div class="header">
    <div>
      <div class="header-title">G4&#x2122; Automation Report</div>
      <div class="header-meta">${esc(name)} &bull; ${esc(fmtDateTime(pp.start))}</div>
    </div>
  </div>`;
        }

        // ── schema detection ─────────────────────────────────────────────────────────

        function detectSchema(data) {
            if (data?.sessions) return { type: 'response', root: data };
            const vals = Object.values(data || {});
            if (vals.length && vals[0]?.sessions) return { type: 'response', root: vals[0] };
            if (data?.stages?.[0]?.jobs?.[0]?.rules) return { type: 'request', root: data };
            return { type: 'unknown', root: data || {} };
        }

        function renderRequestRule(rule) {
            const type = rule.$type || 'Action';
            const name = rule.capabilities?.displayName || rule.pluginName || '?';
            const arg = rule.argument || '';
            const elem = rule.onElement || '';
            return `<div class="plugin-row">
    <div class="p-toggle"><span class="p-toggle-spacer"></span></div>
    <svg class="p-led" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="8" height="8"><path fill="currentColor" d="M64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320z"/></svg>
    <span class="p-name">${esc(name)}</span>
    ${arg ? `<span class="p-arg">${esc(trunc(arg, 55))}</span>` : ''}
    ${elem ? `<span class="p-elem">&#x2022; ${esc(trunc(elem, 40))}</span>` : ''}
    <span class="p-spacer"></span>
  </div>`;
        }

        function renderRequestTimeline(stages) {
            const ROW = 24, LW = 155, CW = 740, PAD = 6;
            const allRules = stages.flatMap(st => st.jobs || []).flatMap(j => j.rules || []);
            const total = allRules.length;
            if (!total) return '<div class="no-data">No actions to display.</div>';

            const svgH = ROW * total + PAD * 2;
            const segW = CW / total;

            const rowsSvg = allRules.map((rule, i) => {
                const name = rule.capabilities?.displayName || rule.pluginName || '?';
                const y = PAD + i * ROW;
                const xS = LW + i * segW;
                const w = Math.max(2, segW - 1);
                return `<text x="${LW - 4}" y="${y + ROW / 2 + 4}" text-anchor="end" fill="currentColor" font-size="11" font-family="Segoe UI,sans-serif">${esc(trunc(name, 18))}</text>
      <rect x="${xS.toFixed(1)}" y="${y + 5}" width="${w.toFixed(1)}" height="${ROW - 10}" fill="currentColor">
        <title>${esc(name)}</title>
      </rect>`;
            }).join('');

            return `<div class="tl-wrap">
    <svg class="svg-block" width="${LW + CW + PAD}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
      ${rowsSvg}
    </svg>
  </div>`;
        }

        function renderRequestView(data) {
            const s = data.settings?.automationSettings || {};
            const stages = data.stages || [];
            const allJobs = stages.flatMap(st => st.jobs || []);
            const allRules = allJobs.flatMap(j => j.rules || []);
            const cards = [
                { label: 'Total Runtime',     value: '—' },
                { label: 'Avg. Action Time',  value: '—' },
                { label: 'Total Actions',     value: String(allRules.length) },
                { label: 'Total Exceptions',  value: '—' },
                { label: 'Failed Assertions', value: '—' },
                { label: 'Total Timeouts',    value: '—' },
            ];
            const stagesHtml = stages.map(stage => {
                const jobs = stage.jobs || [];
                const sid = stage.reference?.id || ('s' + Math.random().toString(36).slice(2));
                const sname = stage.reference?.name || 'Stage';
                return `<div class="tree-stage">
      <div class="tree-stage-hdr" onclick="togEl('rs-${esc(sid)}','ri-${esc(sid)}')">
        <i class="chev open" id="ri-${esc(sid)}">${SVG_CHEV}</i>
                ${esc(sname)}
        <span class="meta-text">${jobs.length} job${jobs.length !== 1 ? 's' : ''}</span>
      </div>
      <div id="rs-${esc(sid)}">
        ${jobs.map(job => {
                    const rules = job.rules || [];
                    const jid = job.reference?.id || ('j' + Math.random().toString(36).slice(2));
                    const jname = job.reference?.name || 'Job';
                    return `<div class="tree-job">
            <div class="tree-job-hdr" onclick="togEl('rj-${esc(jid)}','rji-${esc(jid)}')">
              <i class="chev open" id="rji-${esc(jid)}">${SVG_CHEV}</i>
                            ${esc(jname)}
              <span class="meta-text">${rules.length} action${rules.length !== 1 ? 's' : ''}</span>
            </div>
            <div id="rj-${esc(jid)}">${rules.map(r => renderRequestRule(r)).join('')}</div>
          </div>`;
                }).join('')}
      </div>
    </div>`;
            }).join('');
            return `<div class="cards cards-6 cards-req">
    ${cards.map(c => `<div class="card"><div class="card-label">${esc(c.label)}</div><div class="card-value">${esc(c.value)}</div></div>`).join('')}
  </div>
  <div class="section">
    <div class="section-hdr" onclick="togEl('req-tree','req-tree-chev')">
      <i class="chev open" id="req-tree-chev">${SVG_CHEV}</i>
      Rule Tree <span class="meta-text">${stages.length} stage${stages.length !== 1 ? 's' : ''} &bull; ${allJobs.length} job${allJobs.length !== 1 ? 's' : ''} &bull; ${allRules.length} action${allRules.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="section-body" id="req-tree">${stagesHtml}</div>
  </div>
  <div class="section section-mt">
    <div class="section-hdr" onclick="togEl('req-tl','req-tl-chev')">
      <i class="chev open" id="req-tl-chev">${SVG_CHEV}</i>
      Execution Timeline
      <span class="meta-text">${allRules.length} action${allRules.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="section-body" id="req-tl">${renderRequestTimeline(stages)}</div>
  </div>`;
        }

        // ── main ────────────────────────────────────────────────────────────────────

        function renderApp() {
            const schema = detectSchema(DATA);
            const root = schema.root;
            const pp = root.performancePoint || {};
            const sessions = root.sessions || {};
            const sids = Object.keys(sessions);

            if (schema.type === 'request') {
                const driver = root.driverParameters?.driver || '—';
                const browser = root.driverParameters?.capabilities?.alwaysMatch?.browserName || '—';
                document.getElementById('g4-header').innerHTML =
                    `<div class="header">
                        <div>
                            <div class="header-title">G4&#x2122; Request Configuration</div>
                            <div class="header-meta">${esc(driver)} &bull; ${esc(browser)}</div>
                        </div>
                        <div class="header-right"><span class="tag tag-neutral">Request</span></div>
                    </div>`;
                document.getElementById('app').innerHTML = `<div class="main">${renderRequestView(root)}</div>`;
                return;
            }

            if (!sids.length) {
                document.getElementById('g4-header').innerHTML =
                    `<div class="header">
                        <div>
                            <div class="header-title">G4&#x2122; Automation Report</div>
                            <div class="header-meta">No session data found</div>
                        </div>
                    </div>`;
                document.getElementById('app').innerHTML =
                    `<div class="main"><div class="error-body">
                        <div class="error-title">Unrecognized format</div>
                        <div class="error-desc">Expected a G4 response with <code class="code-tag">sessions</code> and <code class="code-tag">responseTree</code> keys.</div>
                    </div></div>`;
                return;
            }

            let automationRef = {};
            if (sids.length) {
                const first = sessions[sids[0]];
                const stages = first.responseTree?.stages || [];
                if (stages.length) automationRef = stages[0].automationReference || {};
            }

            const sessionHtml = sids.map((sid, idx) => {
                const session = sessions[sid];
                const spp = session.performancePoint || {};
                const stages = session.responseTree?.stages || [];
                const allJobs = stages.flatMap(s => s.jobs || []);
                const allPlugs = allJobs.flatMap(j => collectAll(j.plugins));
                const asserts = allJobs.flatMap(j => collectAssertions(j.plugins));
                const fails = asserts.filter(a => a.content?.Evaluation === false).length;
                const passes = asserts.filter(a => a.content?.Evaluation === true).length;
                const machine = findMachineInfo(stages);

                const LED = (fill) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="10" height="10"><path fill="${fill}" d="M64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320z"/></svg>`;
                return `<div>
      <!-- session title bar -->
      <div class="session-title-bar">
        <span class="session-label">Session</span>
        <span class="mono session-id">${esc(sid)}</span>
      </div>

      <!-- session info strip -->
      <div class="session-info">
        ${machine ? `
        <div class="si-item"><div class="si-label">Machine</div><div class="si-value">${esc(machine.machineName)}</div></div>
        <div class="si-item"><div class="si-label">IP</div><div class="si-value">${esc(machine.machineIp)}</div></div>
        ` : ''}
        <div class="si-item"><div class="si-label">Start</div><div class="si-value">${esc(fmtTime(spp.start))}</div></div>
        <div class="si-item"><div class="si-label">End</div><div class="si-value">${esc(fmtTime(spp.end))}</div></div>
        <div class="si-item"><div class="si-label">Plugins Run</div><div class="si-value">${allPlugs.length}</div></div>
        <div class="si-item"><div class="si-label">Stages</div><div class="si-value">${stages.length}</div></div>
        <div class="si-item"><div class="si-label">Jobs</div><div class="si-value">${allJobs.length}</div></div>
      </div>

      <!-- stat cards -->
      ${renderCards(spp, stages)}

      <!-- plugin tree -->
      <div class="section section-mt-lg">
        <div class="section-hdr" onclick="togEl('tr-${sid}','ti-${sid}')">
          <i class="chev open" id="ti-${sid}">${SVG_CHEV}</i>
          Plugin Tree
          <span class="meta-text">${stages.length} stage${stages.length !== 1 ? 's' : ''} &bull; ${allJobs.length} job${allJobs.length !== 1 ? 's' : ''} &bull; ${allPlugs.length} total plugins</span>
        </div>
        <div class="section-body" id="tr-${sid}">${renderTree(stages)}</div>
      </div>

      <!-- timeline -->
      <div class="section section-mt">
        <div class="section-hdr" onclick="togEl('tl-${sid}','tli-${sid}')">
          <i class="chev open" id="tli-${sid}">${SVG_CHEV}</i>
          Execution Timeline
        </div>
        <div class="section-body" id="tl-${sid}">${renderTimeline(stages, spp.start, spp.end)}</div>
      </div>

      <!-- assertions -->
      <div class="section section-mt">
        <div class="section-hdr" onclick="togEl('as-${sid}','ai-${sid}')">
          <i class="chev open" id="ai-${sid}">${SVG_CHEV}</i>
          Assertions
          ${fails > 0 ? `<span class="assert-count">${LED('#ef4444')}${fails} Fail</span>` : ''}
          ${passes > 0 ? `<span class="assert-count">${LED('#22c55e')}${passes} Pass</span>` : ''}
        </div>
        <div id="as-${sid}">${renderAssertions(asserts)}</div>
      </div>
    </div>`;
            }).join('<div class="session-divider"></div>');

            document.getElementById('g4-header').innerHTML = renderHeader(automationRef, pp);
            document.getElementById('app').innerHTML = `<div class="main">${sessionHtml}</div>`;
        }

        // ── toggle helpers ──────────────────────────────────────────────────────────

        function togEl(id, iconId) {
            const el = document.getElementById(id);
            const ic = document.getElementById(iconId);
            if (!el) return;
            const hide = el.style.display !== 'none';
            el.style.display = hide ? 'none' : '';
            if (ic) { hide ? ic.classList.remove('open') : ic.classList.add('open'); }
        }

        function togPlugin(id) {
            const ch = document.getElementById('ck-' + id);
            const ic = document.getElementById('ci-' + id);
            if (!ch) return;
            const collapsed = ch.classList.contains('hidden');
            ch.classList.toggle('hidden', !collapsed);
            if (ic) { collapsed ? ic.classList.add('open') : ic.classList.remove('open'); }
        }

        renderApp();
    </script>
</body>

</html>
